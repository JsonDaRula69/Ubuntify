autoinstall:
  version: 1

  refresh-installer:
    update: false

  kernel:
    package: linux-image-6.8.0-100-generic

  timezone: America/Los_Angeles

  apt:
    preserve_sources_list: true

  identity:
    hostname: macpro-vmtest
    username: ubuntu
    realname: VM Test User
    password: "$6$i1v2DZZ1Q6RSESjG$BALbWX8NNSC7qCU8xOnl0k6I/TpHLpNrhOrabzfypBHnz99Gff8xhjrwHLVMATtAeTOI3DaV5IjkTLxS/40lC1"

  ssh:
    install-server: true
    allow-pw: true
    authorized-keys:
      __SSH_KEYS__

  reporting:
    builtin:
      type: print
    macpro-monitor:
      type: webhook
      endpoint: "http://10.0.2.2:8081/webhook"
      level: DEBUG

  early-commands:
    - |
      set -x
      _dump_log() { cat "$LOG" > /dev/console 2>/dev/null || true; }
      trap '_dump_log' EXIT
      KVER="$(uname -r)"
      ABI_VER="${KVER%-generic}"
      LOG="/run/macpro.log"
      CIDATA=""
      for _cidata_mp in /cdrom /isodevice /mnt; do
        if [ -d "$_cidata_mp/macpro-pkgs" ]; then
          CIDATA="$_cidata_mp"
          break
        fi
      done
      CIDATA_LOG_DIR="${CIDATA}/logs"
      _sync_log() { if [ -n "$CIDATA" ] && [ -d "$CIDATA" ]; then mkdir -p "$CIDATA_LOG_DIR" 2>/dev/null; cp "$LOG" "$CIDATA_LOG_DIR/macpro-early.log" 2>/dev/null || true; dmesg > "$CIDATA_LOG_DIR/dmesg-early.log" 2>/dev/null || true; fi; }
      WHURL="http://10.0.2.2:8081/webhook"
      wh() { curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d "$1" > /dev/null 2>&1 || true; }
      die() { echo "[early] FATAL: $1" >> "$LOG"; wh "{\"progress\":${2:-0},\"stage\":\"early\",\"status\":\"failed\",\"message\":\"FATAL: $1\"}"; _sync_log; exit 1; }
      log() { echo "[early] $1" >> "$LOG"; }

      echo "=== VM TEST AUTOINSTALL ===" > "$LOG"
      echo "Kernel: $(uname -r)" >> "$LOG"
      echo "Target: $KVER" >> "$LOG"
      echo "CIDATA: $CIDATA" >> "$LOG"

      PKGS="${CIDATA}/macpro-pkgs"
      if [ ! -d "$PKGS" ]; then
        die "Cannot find macpro-pkgs at $PKGS" 2
      fi
      echo "Packages: $(ls $PKGS/*.deb 2>/dev/null | wc -l) debs" >> "$LOG"
      _sync_log

      # Validate kernel headers exist for running kernel
      wh '{"progress":2,"stage":"prep-init","status":"running","message":"Autoinstall started — validating kernel headers"}'
      if ! ls $PKGS/linux-headers-${ABI_VER}_*.deb 1>/dev/null 2>&1; then
        die "No kernel headers for $KVER in $PKGS" 2
      fi
      # Validate DKMS patches exist — driver WILL NOT compile on kernel 6.8+ without them
      if [ ! -d "$PKGS/dkms-patches" ] || [ ! -f "$PKGS/dkms-patches/series" ]; then
        die "DKMS patches missing — broadcom-sta cannot compile on kernel 6.8+" 2
      fi

      # Install kernel headers
      wh '{"progress":5,"stage":"prep-headers","status":"installing","message":"Installing kernel headers"}'
      log "Installing kernel headers..."
      dpkg --force-depends --skip-same-version -i $PKGS/linux-headers-${ABI_VER}_*.deb \
              $PKGS/linux-headers-${KVER}_*.deb \
              $PKGS/linux-libc-dev_*.deb 2>>"$LOG" || { die "kernel headers install failed" 5; }

      # Install build toolchain
      wh '{"progress":10,"stage":"prep-toolchain","status":"installing","message":"Installing build toolchain (gcc, make, binutils)"}'
      log "Installing build toolchain..."
      dpkg --force-depends --skip-same-version -i $PKGS/binutils-common_*.deb $PKGS/libbinutils_*.deb \
              $PKGS/libctf-nobfd0_*.deb $PKGS/libctf0_*.deb \
              $PKGS/libsframe1_*.deb $PKGS/libgprofng0_*.deb \
              $PKGS/binutils_*.deb $PKGS/binutils-x86-64-linux-gnu_*.deb \
              $PKGS/libgcc-s1_*.deb $PKGS/gcc-13-base_*.deb \
              $PKGS/libisl23_*.deb $PKGS/libmpc3_*.deb \
              $PKGS/libgcc-13-dev_*.deb $PKGS/cpp-13_*.deb \
               $PKGS/cpp-13-x86-64-linux-gnu_*.deb $PKGS/gcc-13-x86-64-linux-gnu_*.deb \
               $PKGS/gcc-13_*.deb $PKGS/gcc-14-base_*.deb $PKGS/libcc1-0_*.deb \
              $PKGS/libstdc++6_*.deb $PKGS/libstdc++-13-dev_*.deb \
              $PKGS/libc-dev-bin_*.deb $PKGS/libc6-dev_*.deb \
              $PKGS/libc-devtools_*.deb $PKGS/libcrypt-dev_*.deb \
              $PKGS/rpcsvc-proto_*.deb \
              $PKGS/make_*.deb $PKGS/build-essential_*.deb \
              $PKGS/fakeroot_*.deb $PKGS/libfakeroot_*.deb \
              $PKGS/patch_*.deb 2>>"$LOG" || { die "build toolchain install failed" 10; }

      # Install DKMS and Broadcom driver source
      wh '{"progress":13,"stage":"prep-dkms","status":"installing","message":"Installing DKMS and Broadcom driver source"}'
      log "Installing DKMS and Broadcom driver source..."
      # broadcom-sta-dkms postinst auto-runs 'dkms add' which may try to build
      # without patches, returning non-zero. This is expected — we apply patches
      # after dpkg and build manually. So || echo WARN here, not fatal.
      dpkg --force-depends --skip-same-version -i $PKGS/dkms_*.deb $PKGS/broadcom-sta-dkms_*.deb 2>>"$LOG" || echo "[early] WARN: dkms/broadcom dpkg returned non-zero (expected if postinst dkms build fails before patches)" >> "$LOG"
      # dkms add is handled by dpkg postinst (creates symlink /var/lib/dkms/.../source -> /usr/src/...)
      # Postinst may have auto-triggered dkms build — remove any broken build before patching
      dkms remove broadcom-sta/6.30.223.271 -k "$KVER" 2>/dev/null || true
      # Patches modify /usr/src/... which is visible through the symlink for dkms build
      # Apply DKMS patches for kernel 6.8+ compatibility from ISO
      if [ -d "$PKGS/dkms-patches" ]; then
        log "Applying DKMS compatibility patches..."
        # Pre-validate ALL patch files exist before applying any
        _missing=0
        for _p in $(grep -vE '^\s*$|^\s*#' "$PKGS/dkms-patches/series"); do
          if [ ! -f "$PKGS/dkms-patches/$_p" ]; then
            log "FATAL: Patch '$_p' listed in series but not found"
            _missing=1
          fi
        done
        if [ "$_missing" -eq 1 ]; then
          die "DKMS patch files missing from series" 14
        fi
        for patch in $(grep -vE '^\s*$|^\s*#' "$PKGS/dkms-patches/series"); do
          if [ -f "$PKGS/dkms-patches/$patch" ]; then
            log "Applying $patch..."
            if ! patch -p1 -d /usr/src/broadcom-sta-6.30.223.271 < "$PKGS/dkms-patches/$patch" >> "$LOG" 2>&1; then
              die "DKMS patch $patch failed to apply" 14
            fi
          else
            die "Patch file $patch listed in series but not found" 14
          fi
        done
      else
        log "WARN: No DKMS patches directory found"
      fi

      # Build wl driver via DKMS
      wh '{"progress":15,"stage":"prep-build","status":"building","message":"Compiling wl driver via DKMS"}'
      log "Building wl driver via DKMS..."
      ln -sf /usr/bin/x86_64-linux-gnu-gcc-13 /usr/bin/cc 2>/dev/null || ln -sf /usr/bin/gcc-13 /usr/bin/cc 2>/dev/null || true
      if ! dkms build broadcom-sta/6.30.223.271 -k "$KVER" 2>>"$LOG"; then
        _dkms_rc=$?
        log "dkms build exit code: $_dkms_rc"
        for _make_log in \
          /var/lib/dkms/broadcom-sta/6.30.223.271/$KVER/x86_64/make.log \
          /var/lib/dkms/broadcom-sta/6.30.223.271/build/make.log; do
          if [ -f "$_make_log" ]; then
            echo "=== DKMS make.log ($_make_log) ===" >> "$LOG"
            cat "$_make_log" >> "$LOG"
            cat "$_make_log" > /dev/console 2>/dev/null
          fi
        done
        log "WARN: dkms build failed, retrying after clean..."
        dkms remove broadcom-sta/6.30.223.271 -k "$KVER" 2>/dev/null || true
        sleep 2
        if ! dkms build broadcom-sta/6.30.223.271 -k "$KVER" 2>>"$LOG"; then
          die "dkms build failed on retry" 15
        fi
      fi
      if ! dkms install broadcom-sta/6.30.223.271 -k "$KVER" 2>>"$LOG"; then
        log "WARN: dkms install failed, retrying..."
        sleep 2
        if ! dkms install broadcom-sta/6.30.223.271 -k "$KVER" 2>>"$LOG"; then
          die "dkms install failed on retry" 15
        fi
      fi

      # Blacklist conflicting drivers and load wl (non-fatal in VM — no Broadcom hardware)
      for drv in b43 ssb bcma brcmsmac; do
          echo "blacklist $drv" >> /etc/modprobe.d/blacklist-bcm.conf
      done
      rmmod b43 ssb bcma brcmsmac 2>/dev/null || true
      log "Loading wl module..."
      modprobe wl 2>>"$LOG" || echo "[early] WARN: modprobe wl failed (expected in VM — no Broadcom hardware)" >> "$LOG"
      sleep 5
      if ! lsmod | grep -q wl; then
        log "WARN: wl not loaded, retrying after forcing conflicting drivers off..."
        for drv in b43 ssb bcma brcmsmac wl; do rmmod $drv 2>/dev/null || true; done
        modprobe wl 2>>"$LOG" || echo "[early] WARN: modprobe wl retry failed (expected in VM)" >> "$LOG"
        sleep 5
      fi
      if lsmod | grep -q wl; then
        log "SUCCESS: wl module loaded"
        wh '{"progress":18,"stage":"prep-wifi","status":"loaded","message":"WiFi driver loaded successfully"}'
      else
        log "WARN: wl module not loaded — VM has no Broadcom hardware, skipping WiFi setup"
        wh '{"progress":18,"stage":"prep-wifi","status":"skipped","message":"VM: wl module not loaded (no Broadcom HW)"}'
      fi

      # Detect WiFi interface (non-fatal — VM has no WiFi hardware)
      wh '{"progress":20,"stage":"prep-wifi","status":"detecting","message":"Detecting WiFi interface"}'
      log "Detecting WiFi interface..."
      _wifi_iface=""
      i=1
      while [ $i -le 10 ]; do
        _wifi_iface=$(ip link show 2>/dev/null | grep -oE 'wl[pw][^:]+' | head -1)
        [ -n "$_wifi_iface" ] && break
        sleep 1
        i=$((i + 1))
      done
      if [ -n "$_wifi_iface" ]; then
        log "WiFi interface detected: $_wifi_iface"
        wh '{"progress":22,"stage":"prep-wifi","status":"online","message":"WiFi interface detected"}'
      else
        log "WARN: No WiFi interface — VM test mode, using Ethernet"
        wh '{"progress":22,"stage":"prep-wifi","status":"skipped","message":"VM: No WiFi interface (using Ethernet)"}'
      fi

      # Start SSH server for remote debugging
      wh '{"progress":23,"stage":"prep-ssh","status":"starting","message":"Starting SSH server for remote debugging"}'
      log "Starting SSH server for remote debugging..."
      # Use ISO pool fallback only — apt-get is banned in VM
      dpkg --force-depends -i /cdrom/pool/main/o/openssh/openssh-server_*.deb /cdrom/pool/main/o/openssh/openssh-sftp-server_*.deb 2>>"$LOG" || true
      if [ ! -f /usr/sbin/sshd ]; then
        dpkg --force-depends -i /isodevice/pool/main/o/openssh/openssh-server_*.deb /isodevice/pool/main/o/openssh/openssh-sftp-server_*.deb 2>>"$LOG" || true
      fi
      if [ -f /usr/sbin/sshd ]; then
        # Create installer user for SSH access (ssh: install-server only applies to target)
        useradd -m -s /bin/bash ubuntu 2>/dev/null || true
        echo "ubuntu:ubuntu" | chpasswd 2>/dev/null || true
        mkdir -p /home/ubuntu/.ssh 2>/dev/null || true
        : > /home/ubuntu/.ssh/authorized_keys 2>/dev/null || true
        for _key in __SSH_KEYS_LIST__; do
          echo "$_key" >> /home/ubuntu/.ssh/authorized_keys 2>/dev/null || true
        done
        chmod 700 /home/ubuntu/.ssh 2>/dev/null || true
        chmod 600 /home/ubuntu/.ssh/authorized_keys 2>/dev/null || true
        chown -R ubuntu:ubuntu /home/ubuntu/.ssh 2>/dev/null || true
        mkdir -p /run/sshd
        /usr/sbin/sshd -D -e &
        log "SSH server started (installer user: ubuntu, pass: ubuntu)"
        wh '{"progress":25,"stage":"prep-ssh","status":"ready","message":"SSH server ready — early-commands complete"}'
      else
        log "WARNING: Could not start SSH server"
      fi

      wh '{"progress":28,"stage":"prep-netcheck","status":"verified","message":"VM test setup complete"}'
      set +x

  network:
    version: 2
    renderer: networkd
    ethernets:
      enp0s3:
        dhcp4: true

  packages:
    - openssh-server
    - wpasupplicant
    - curl
    - wireless-tools
    - avahi-daemon
    - libnss-mdns
    - efibootmgr
    - ufw

  storage:
    config:
      - type: disk
        id: root-disk
        path: /dev/sda
        ptable: gpt
        wipe: superblock
      - type: partition
        id: efi-partition
        device: root-disk
        size: 512M
        flag: boot
        partition_type: c12a7328-f81f-11d2-ba4b-00a0c93ec93b
        grub_device: true
      - type: format
        id: efi-format
        volume: efi-partition
        fstype: fat32
      - type: mount
        id: efi-mount
        device: efi-format
        path: /boot/efi
      - type: partition
        id: boot-partition
        device: root-disk
        size: 1G
      - type: format
        id: boot-format
        volume: boot-partition
        fstype: ext4
      - type: mount
        id: boot-mount
        device: boot-format
        path: /boot
      - type: partition
        id: root-partition
        device: root-disk
        size: -1
      - type: format
        id: root-format
        volume: root-partition
        fstype: ext4
      - type: mount
        id: root-mount
        device: root-format
        path: /

  late-commands:
    - |
      # sh -c block — must redefine all helpers
      KVER="$(uname -r)"
      ABI_VER="${KVER%-generic}"
      LOG="/run/macpro.log"
      CIDATA=""
      for _cidata_mp in /cdrom /isodevice /mnt /target/cdrom; do
        if [ -d "$_cidata_mp/macpro-pkgs" ]; then
          CIDATA="$_cidata_mp"
          break
        fi
      done
      CIDATA_LOG_DIR="${CIDATA}/logs"
      _sync_log() { if [ -n "$CIDATA" ] && [ -d "$CIDATA" ]; then mkdir -p "$CIDATA_LOG_DIR" 2>/dev/null; cp "$LOG" "$CIDATA_LOG_DIR/macpro-late.log" 2>/dev/null || true; dmesg > "$CIDATA_LOG_DIR/dmesg-late.log" 2>/dev/null || true; fi; }
      WHURL="http://10.0.2.2:8081/webhook"
      wh() { curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d "$1" > /dev/null 2>&1 || true; }
      die() { echo "[late] FATAL: $1" >> "$LOG"; wh "{\"progress\":${2:-29},\"stage\":\"late\",\"status\":\"failed\",\"message\":\"FATAL: $1\"}"; _sync_log; exit 1; }
      log() { echo "[late] $1" >> "$LOG"; }
      _dump_log() { cat "$LOG" > /dev/console 2>/dev/null || true; }
      trap '_dump_log' EXIT

      log "Late commands starting..."
      wh '{"progress":29,"stage":"late-init","status":"running","message":"Late commands started — validating kernel headers"}'

      PKGS="${CIDATA}/macpro-pkgs"
      if [ ! -d "$PKGS" ]; then
        die "Cannot find macpro-pkgs at $PKGS" 29
      fi
      # Validate kernel headers exist before attempting install
      if ! ls $PKGS/linux-headers-${ABI_VER}_*.deb 1>/dev/null 2>&1; then
        die "No matching kernel headers for $KVER in $PKGS" 30
      fi
      # Validate DKMS patches exist — driver WILL NOT compile on kernel 6.8+ without them
      if [ ! -d "$PKGS/dkms-patches" ] || [ ! -f "$PKGS/dkms-patches/series" ]; then
        die "DKMS patches missing — broadcom-sta cannot compile on kernel 6.8+" 30
      fi

      # Stage 1: Kernel headers (no deps)
      wh '{"progress":35,"stage":"late-headers","status":"installing","message":"Stage 1/4: Installing kernel headers into target"}'
      dpkg --root /target --force-depends --skip-same-version -i \
        $PKGS/linux-headers-${ABI_VER}_*.deb \
        $PKGS/linux-headers-${KVER}_*.deb \
        $PKGS/linux-libc-dev_*.deb 2>>"$LOG" || { die "Stage 1 (headers) failed — cannot proceed without kernel headers" 35; }

      # Stage 2: Base libraries first, then binaries that depend on them
      wh '{"progress":45,"stage":"late-libs","status":"installing","message":"Stage 2/4: Installing base libraries into target"}'
      dpkg --root /target --force-depends --skip-same-version -i \
        $PKGS/binutils-common_*.deb $PKGS/libbinutils_*.deb \
        $PKGS/libctf-nobfd0_*.deb $PKGS/libctf0_*.deb \
        $PKGS/libsframe1_*.deb $PKGS/libgprofng0_*.deb \
        $PKGS/libgcc-s1_*.deb $PKGS/gcc-13-base_*.deb \
        $PKGS/libisl23_*.deb $PKGS/libmpc3_*.deb $PKGS/libmpfr6_*.deb \
        $PKGS/libstdc++6_*.deb $PKGS/libstdc++-13-dev_*.deb \
        $PKGS/libcrypt-dev_*.deb $PKGS/libc-dev-bin_*.deb \
        $PKGS/libc6-dev_*.deb $PKGS/rpcsvc-proto_*.deb \
        $PKGS/libc-devtools_*.deb \
        $PKGS/binutils_*.deb $PKGS/binutils-x86-64-linux-gnu_*.deb \
        $PKGS/libgcc-13-dev_*.deb $PKGS/cpp-13_*.deb \
        $PKGS/libcc1-0_*.deb $PKGS/cpp-13-x86-64-linux-gnu_*.deb \
        $PKGS/gcc-13-x86-64-linux-gnu_*.deb $PKGS/gcc-13_*.deb \
        $PKGS/gcc-14-base_*.deb 2>>"$LOG" || { die "Stage 2 (libs) failed — cannot proceed without base libraries" 45; }

      # Stage 3: Build tools (depend on stage 2)
      wh '{"progress":55,"stage":"late-tools","status":"installing","message":"Stage 3/4: Installing build tools into target"}'
      dpkg --root /target --force-depends --skip-same-version -i \
        $PKGS/make_*.deb $PKGS/build-essential_*.deb \
        $PKGS/fakeroot_*.deb $PKGS/libfakeroot_*.deb \
        $PKGS/patch_*.deb 2>>"$LOG" || { die "Stage 3 (tools) failed — cannot proceed without build tools" 55; }

      # Stage 4: DKMS and driver (depend on stage 3)
      wh '{"progress":60,"stage":"late-dkms","status":"building","message":"Stage 4/4: Installing DKMS and compiling WiFi driver for target"}'
      # broadcom-sta-dkms postinst auto-runs 'dkms add' which may try to build
      # without patches, returning non-zero. This is expected — we apply patches
      # after dpkg and build manually. So non-fatal here.
      dpkg --root /target --force-depends -i $PKGS/dkms_*.deb $PKGS/broadcom-sta-dkms_*.deb 2>>"$LOG" || echo "[late] WARN: dkms/broadcom dpkg returned non-zero (expected if postinst dkms build fails before patches)" >> "$LOG"
      # dkms add handled by postinst; postinst may auto-trigger dkms build — clean before patching
      chroot /target dkms remove broadcom-sta/6.30.223.271 -k "$KVER" 2>/dev/null || true
      # Apply DKMS patches for kernel 6.8+ compatibility (before dkms build, after dkms add)
      if [ -d "$PKGS/dkms-patches" ]; then
        log "Applying DKMS compatibility patches in target..."
        # Pre-validate ALL patch files exist before applying any
        _missing=0
        for _p in $(grep -vE '^\s*$|^\s*#' "$PKGS/dkms-patches/series"); do
          if [ ! -f "$PKGS/dkms-patches/$_p" ]; then
            log "FATAL: Patch '$_p' listed in series but not found"
            _missing=1
          fi
        done
        if [ "$_missing" -eq 1 ]; then
          die "DKMS patch files missing from series in late-commands" 61
        fi
        for patch in $(grep -vE '^\s*$|^\s*#' "$PKGS/dkms-patches/series"); do
          if [ -f "$PKGS/dkms-patches/$patch" ]; then
            log "Applying $patch..."
            if ! chroot /target patch -p1 -d /usr/src/broadcom-sta-6.30.223.271 < "$PKGS/dkms-patches/$patch" >> "$LOG" 2>&1; then
              die "DKMS patch $patch failed to apply in target" 61
            fi
          else
            die "Patch file $patch listed in series but not found" 61
          fi
        done
      fi
      # Bind-mount /proc, /sys, /dev for chroot DKMS compilation
      # Set up cleanup trap so mounts are always unmounted, even on failure
      trap '_dump_log; umount /target/dev /target/sys /target/proc 2>/dev/null || true' EXIT
      mount --bind /proc /target/proc 2>>"$LOG" || { die "mount /proc failed" 60; }
      mount --bind /sys /target/sys 2>>"$LOG" || { umount /target/proc 2>/dev/null || true; die "mount /sys failed" 60; }
      mount --bind /dev /target/dev 2>>"$LOG" || { umount /target/sys /target/proc 2>/dev/null || true; die "mount /dev failed" 60; }
      # dkms add handled by dpkg postinst; patches applied above before bind mounts
      chroot /target ln -sf /usr/bin/x86_64-linux-gnu-gcc-13 /usr/bin/cc 2>/dev/null || chroot /target ln -sf /usr/bin/gcc-13 /usr/bin/cc 2>/dev/null || true
      if ! chroot /target dkms build broadcom-sta/6.30.223.271 -k "$KVER" 2>>"$LOG"; then
        log "WARN: dkms build failed in target, retrying after clean..."
        chroot /target dkms remove broadcom-sta/6.30.223.271 -k "$KVER" 2>/dev/null || true
        sleep 2
        if ! chroot /target dkms build broadcom-sta/6.30.223.271 -k "$KVER" 2>>"$LOG"; then
          die "dkms build failed in target on retry" 63
        fi
      fi
      if ! chroot /target dkms install broadcom-sta/6.30.223.271 -k "$KVER" 2>>"$LOG"; then
        log "WARN: dkms install failed in target, retrying..."
        sleep 2
        if ! chroot /target dkms install broadcom-sta/6.30.223.271 -k "$KVER" 2>>"$LOG"; then
          die "dkms install failed in target on retry" 64
        fi
      fi
      umount /target/dev /target/sys /target/proc 2>/dev/null || true
      echo "wl" >> /target/etc/modules
      printf '# Disable WiFi power management to prevent disconnects\noptions wl\n' > /target/etc/modprobe.d/wl.conf
      echo "options cfg80211 ieee80211_regdom=US" > /target/etc/modprobe.d/cfg80211.conf
      # Blacklist conflicting Broadcom drivers in target system
      for drv in b43 ssb bcma brcmsmac; do
        echo "blacklist $drv" >> /target/etc/modprobe.d/blacklist-bcm.conf
      done
      # Create helper script to disable WiFi power management (avoids systemd quoting hell)
      mkdir -p /target/usr/local/bin
      printf '#!/bin/sh\n# Disable WiFi power management to prevent disconnects\nIW=$(iwconfig 2>/dev/null | grep -oE "^wl[pw]?[0-9]*|^wlan[0-9]+" | head -1)\nif [ -n "$IW" ]; then\n  iwconfig "$IW" power off 2>/dev/null || true\nfi\n' > /target/usr/local/bin/wl-poweroff
      chmod +x /target/usr/local/bin/wl-poweroff
      # Create systemd service that calls the helper script
      printf '[Unit]\nDescription=Disable WiFi power management\nAfter=network.target\n\n[Service]\nType=oneshot\nExecStart=/usr/local/bin/wl-poweroff\nRemainAfterExit=yes\n\n[Install]\nWantedBy=multi-user.target\n' > /target/etc/systemd/system/wl-poweroff.service
      chroot /target systemctl enable wl-poweroff.service 2>>"$LOG" || echo "[late] WARN: wl-poweroff service enable failed" >> "$LOG"
      log "WiFi driver installed into target"
      wh '{"progress":65,"stage":"late-dkms","status":"installed","message":"WiFi driver compiled and installed into target"}'

    - |
      # sh -c block — must redefine all helpers
      WHURL="http://10.0.2.2:8081/webhook"
      LOG="/run/macpro.log"
      wh() { curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d "$1" > /dev/null 2>&1 || true; }
      _dump_log() { cat "$LOG" > /dev/console 2>/dev/null || true; }
      trap '_dump_log' EXIT

      wh '{"progress":70,"stage":"late-netplan","status":"configuring","message":"Writing network configuration"}'
      # Remove autoinstall-generated netplan to avoid conflict, write dual config
      rm -f /target/etc/netplan/50-cloud-init.yaml 2>/dev/null || true
      mkdir -p /target/etc/netplan
      # Write Ethernet config (primary for VM)
      printf 'network:\n  version: 2\n  renderer: networkd\n  ethernets:\n    enp0s3:\n      dhcp4: true\n' > /target/etc/netplan/01-ethernet.yaml
      chmod 600 /target/etc/netplan/01-ethernet.yaml
      # Write WiFi config (fallback for VM — no WiFi hardware, so skip wifis netplan)
      _wifi_late_iface=$(ip link show 2>/dev/null | grep -oE 'wl[^:]+' | head -1)
      if [ -n "$_wifi_late_iface" ]; then
        printf 'network:\n  version: 2\n  renderer: networkd\n  wifis:\n    %s:\n      dhcp4: true\n      optional: true\n      access-points:\n        "ATTj6pXatS":\n          password: "j75b39=z?mpg"\n' "$_wifi_late_iface" > /target/etc/netplan/02-wifi.yaml
      else
        # No WiFi interface in VM — skip WiFi netplan entirely (enp0s3 is sufficient)
        # networkd does NOT support match: for wifis — only interface names
        echo "[late] No WiFi interface detected — skipping WiFi netplan config" >> "$LOG"
      fi
      [ -f /target/etc/netplan/02-wifi.yaml ] && chmod 600 /target/etc/netplan/02-wifi.yaml
      if command -v netplan 2>/dev/null >/dev/null; then
        if ! netplan generate --root-dir /target 2>>"$LOG"; then
          echo "[late] WARN: netplan generate failed, attempting simplified config..." >> "$LOG"
          rm -f /target/etc/netplan/02-wifi.yaml
          printf 'network:\n  version: 2\n  renderer: networkd\n  wifis:\n    wl0:\n      dhcp4: true\n      optional: true\n      access-points:\n        "ATTj6pXatS":\n          password: "j75b39=z?mpg"\n' > /target/etc/netplan/02-wifi.yaml
          chmod 600 /target/etc/netplan/02-wifi.yaml
          if ! netplan generate --root-dir /target 2>>"$LOG"; then
            echo "[late] FATAL: netplan generate failed even with simplified config" >> "$LOG"
            exit 1
          fi
          echo "[late] Netplan regenerated with simplified config (no match clause)" >> "$LOG"
        fi
      fi
      wh '{"progress":73,"stage":"late-netplan","status":"configured","message":"Network configuration written"}'

    - |
      # sh -c block — must redefine all helpers
      WHURL="http://10.0.2.2:8081/webhook"
      LOG="/run/macpro.log"
      wh() { curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d "$1" > /dev/null 2>&1 || true; }
      _dump_log() { cat "$LOG" > /dev/console 2>/dev/null || true; }
      trap '_dump_log' EXIT

      wh '{"progress":75,"stage":"late-grub","status":"configuring","message":"Configuring GRUB bootloader"}'
      mkdir -p /target/etc/default/grub.d
      echo 'GRUB_CMDLINE_LINUX_DEFAULT="nomodeset console=ttyS0,115200"' > /target/etc/default/grub.d/macpro.cfg
      sed -i 's/^GRUB_DISABLE_OS_PROBER=.*/GRUB_DISABLE_OS_PROBER=false/' /target/etc/default/grub
      if ! grep -q '^GRUB_DISABLE_OS_PROBER=' /target/etc/default/grub; then
        echo 'GRUB_DISABLE_OS_PROBER=false' >> /target/etc/default/grub
      fi
      # fwsetup entry only (no macOS in VM)
      printf '#!/bin/sh\nexec tail -n +3 "$0"\nmenuentry "Reboot to Firmware" {\n  fwsetup\n}\n' > /target/etc/grub.d/40_macos
      chmod +x /target/etc/grub.d/40_macos
      chroot /target update-grub 2>>"$LOG" || echo "[late] WARN: update-grub failed" >> "$LOG"
      wh '{"progress":78,"stage":"late-grub","status":"configured","message":"GRUB bootloader configured"}'

    - |
      # sh -c block — must redefine all helpers
      WHURL="http://10.0.2.2:8081/webhook"
      LOG="/run/macpro.log"
      wh() { curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d "$1" > /dev/null 2>&1 || true; }
      _dump_log() { cat "$LOG" > /dev/console 2>/dev/null || true; }
      trap '_dump_log' EXIT

      wh '{"progress":80,"stage":"late-mdns","status":"configuring","message":"Configuring mDNS hostname resolution"}'
      if grep -q '^hosts:' /target/etc/nsswitch.conf; then
        sed -i 's/^hosts:.*/hosts: files mdns_minimal [NOTFOUND=return] dns/' /target/etc/nsswitch.conf
      else
        echo 'hosts: files mdns_minimal [NOTFOUND=return] dns' >> /target/etc/nsswitch.conf
      fi
      wh '{"progress":83,"stage":"late-mdns","status":"configured","message":"mDNS hostname resolution configured"}'

    - |
      # sh -c block — must redefine all helpers
      KVER="$(uname -r)"
      ABI_VER="${KVER%-generic}"
      LOG="/run/macpro.log"
      WHURL="http://10.0.2.2:8081/webhook"
      wh() { curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d "$1" > /dev/null 2>&1 || true; }
      die() { echo "[late] FATAL: $1" >> "$LOG"; wh "{\"progress\":${2:-85},\"stage\":\"late\",\"status\":\"failed\",\"message\":\"FATAL: $1\"}"; exit 1; }
      log() { echo "[late] $1" >> "$LOG"; }
      _dump_log() { cat "$LOG" > /dev/console 2>/dev/null || true; }
      trap '_dump_log' EXIT

      wh '{"progress":85,"stage":"late-hold","status":"configuring","message":"Pinning kernel version and disabling auto-updates"}'
      chroot /target apt-mark hold "linux-image-${KVER}" 2>>"$LOG" || die "Failed to hold linux-image-${KVER}" 85
      chroot /target apt-mark hold "linux-headers-${KVER}" 2>>"$LOG" || die "Failed to hold linux-headers-${KVER}" 85
      chroot /target apt-mark hold "linux-modules-${KVER}" 2>>"$LOG" || die "Failed to hold linux-modules-${KVER}" 85
      chroot /target apt-mark hold "linux-modules-extra-${KVER}" 2>>"$LOG" || echo "[late] WARN: linux-modules-extra hold failed (may not exist)" >> "$LOG"
      # Disable all automatic updates — kernel updates would break the WiFi driver
      mkdir -p /target/etc/apt/apt.conf.d
      printf 'APT::Periodic::Update-Package-Lists "0";\nAPT::Periodic::Unattended-Upgrade "0";\nAPT::Periodic::Download-Upgradeable-Packages "0";\n' > /target/etc/apt/apt.conf.d/20auto-upgrades
      # Disable cloud-init apt operations and network config
      mkdir -p /target/etc/cloud/cloud.cfg.d
      printf 'apt:\n  preserve_sources_list: true\n  upgrade: false\n' > /target/etc/cloud/cloud.cfg.d/99-disable-apt-upgrade.cfg
      printf 'network: {config: disabled}\n' > /target/etc/cloud/cloud.cfg.d/99-disable-network-config.cfg
      # Mask apt-daily timers
      chroot /target systemctl mask apt-daily.service 2>>"$LOG" || true
      chroot /target systemctl mask apt-daily.timer 2>>"$LOG" || true
      chroot /target systemctl mask apt-daily-upgrade.service 2>>"$LOG" || true
      chroot /target systemctl mask apt-daily-upgrade.timer 2>>"$LOG" || true
      # Comment out apt sources
      if [ -f /target/etc/apt/sources.list ]; then
        sed -i '/^deb/ s/^/#/' /target/etc/apt/sources.list 2>>"$LOG" || true
      fi
      for _list in /target/etc/apt/sources.list.d/*.list; do
        [ -f "$_list" ] || continue
        sed -i '/^deb/ s/^/#/' "$_list" 2>>"$LOG" || true
      done
      # Disable snap auto-refresh if snap is present
      if chroot /target which snap 2>/dev/null; then
        chroot /target snap refresh --hold=forever 2>>"$LOG" || true
      fi
      # Kernel pin preferences
      mkdir -p /target/etc/apt/preferences.d
      printf "Package: linux-image-*\nPin: release o=Ubuntu\nPin-Priority: -1\n\nPackage: linux-headers-*\nPin: release o=Ubuntu\nPin-Priority: -1\n\nPackage: linux-modules-*\nPin: release o=Ubuntu\nPin-Priority: -1\n\nPackage: linux-image-${ABI_VER}*\nPin: release o=Ubuntu\nPin-Priority: 1001\n\nPackage: linux-headers-${ABI_VER}*\nPin: release o=Ubuntu\nPin-Priority: 1001\n\nPackage: linux-modules-${ABI_VER}*\nPin: release o=Ubuntu\nPin-Priority: 1001\n" > /target/etc/apt/preferences.d/99-pin-kernel
      wh '{"progress":87,"stage":"late-hold","status":"pinned","message":"Kernel version pinned, all auto-updates disabled, apt sources commented out"}'

    - |
      # sh -c block — must redefine all helpers
      WHURL="http://10.0.2.2:8081/webhook"
      LOG="/run/macpro.log"
      wh() { curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d "$1" > /dev/null 2>&1 || true; }
      _dump_log() { cat "$LOG" > /dev/console 2>/dev/null || true; }
      trap '_dump_log' EXIT

      wh '{"progress":88,"stage":"late-firewall","status":"configuring","message":"Configuring firewall"}'
      # UFW is installed by packages: section from ISO pool
      if chroot /target which ufw 2>/dev/null; then
        chroot /target ufw default deny incoming 2>>"$LOG" || true
        chroot /target ufw allow 22/tcp 2>>"$LOG" || true
        chroot /target ufw --force enable 2>>"$LOG" || true
      fi

    - |
      # sh -c block — must redefine all helpers
      WHURL="http://10.0.2.2:8081/webhook"
      LOG="/run/macpro.log"
      wh() { curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d "$1" > /dev/null 2>&1 || true; }
      _dump_log() { cat "$LOG" > /dev/console 2>/dev/null || true; }
      trap '_dump_log' EXIT

      wh '{"progress":90,"stage":"late-sudo","status":"configuring","message":"Configuring sudo for user ubuntu"}'
      echo "ubuntu ALL=(ALL) NOPASSWD:ALL" >> /target/etc/sudoers.d/ubuntu
      chmod 440 /target/etc/sudoers.d/ubuntu

    - |
      # sh -c block — must redefine all helpers
      WHURL="http://10.0.2.2:8081/webhook"
      LOG="/run/macpro.log"
      wh() { curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d "$1" > /dev/null 2>&1 || true; }
      die() { echo "[late] FATAL: $1" >> "$LOG"; wh "{\"progress\":${2:-97},\"stage\":\"late\",\"status\":\"failed\",\"message\":\"FATAL: $1\"}"; exit 1; }
      log() { echo "[late] $1" >> "$LOG"; }
      _dump_log() { cat "$LOG" > /dev/console 2>/dev/null || true; }
      trap '_dump_log' EXIT

      wh '{"progress":95,"stage":"late-logs","status":"saving","message":"Saving installation logs"}'
      mkdir -p /target/var/log/macpro-install
      cp /run/macpro.log /target/var/log/macpro-install/early-commands.log || true
      dmesg > /target/var/log/macpro-install/dmesg.log || true

      wh '{"progress":97,"stage":"late-verify","status":"verifying","message":"Verifying target system before reboot"}'
      log "Verifying target system integrity..."
      VERIFY_OK=true
      if [ ! -f /target/vmlinuz ] && [ ! -f /target/boot/vmlinuz-* ]; then
        log "WARN: No kernel found in /target"
        VERIFY_OK=false
      fi
      if [ ! -f /target/etc/netplan/01-ethernet.yaml ]; then
        log "WARN: Netplan Ethernet config missing in /target"
        VERIFY_OK=false
      fi
      if [ ! -f /target/etc/netplan/02-wifi.yaml ]; then
        log "WARN: Netplan WiFi config missing in /target"
        VERIFY_OK=false
      fi
      WIFI_MODULE_FOUND=false
      if ls /target/lib/modules/*/updates/dkms/wl.ko* 2>/dev/null | head -1 > /dev/null 2>&1; then
        WIFI_MODULE_FOUND=true
      elif ls /target/lib/modules/*/extra/wl.ko* 2>/dev/null | head -1 > /dev/null 2>&1; then
        WIFI_MODULE_FOUND=true
      fi
      if [ "$WIFI_MODULE_FOUND" = "false" ]; then
        log "WARN: No WiFi driver module in /target (expected in VM — no Broadcom HW)"
      fi
      if [ -f /target/etc/default/grub.d/macpro.cfg ]; then
        if ! grep -q 'nomodeset' /target/etc/default/grub.d/macpro.cfg; then
          log "WARN: GRUB nomodeset param missing in target"
          VERIFY_OK=false
        fi
      else
        log "WARN: GRUB macpro.cfg missing in target"
        VERIFY_OK=false
      fi
      # Report verification result (no recovery mode — VM has Ethernet + console)
      if [ "$VERIFY_OK" = "false" ]; then
        log "WARN: Some verification checks failed"
        wh '{"progress":97,"stage":"late-verify","status":"warning","message":"WARN: Some verification checks failed"}'
      else
        log "All verification checks passed"
        wh '{"progress":98,"stage":"late-verify","status":"verified","message":"Target system verification passed"}'
      fi
      wh '{"progress":100,"stage":"complete","status":"done","message":"Installation complete — rebooting"}'

  error-commands:
    - |
      WHURL="http://10.0.2.2:8081/webhook"
      _dump_log() { cat "/run/macpro.log" > /dev/console 2>/dev/null || true; }
      trap '_dump_log' EXIT
      echo "=== ERROR — dumping full log to console ===" > /dev/console 2>/dev/null
      LOG="/run/macpro.log"
      cat "$LOG" > /dev/console 2>/dev/null
      echo "=== DKMS make.log ===" > /dev/console 2>/dev/null
      for _ml in /var/lib/dkms/broadcom-sta/6.30.223.271/*/x86_64/make.log; do
        [ -f "$_ml" ] && cat "$_ml" > /dev/console 2>/dev/null
      done
    - |
      WHURL="http://10.0.2.2:8081/webhook"
      _dump_log() { cat "/run/macpro.log" > /dev/console 2>/dev/null || true; }
      trap '_dump_log' EXIT
      curl -s -X POST "$WHURL" -H "Content-Type: application/json" \
        -d '{"progress":0,"stage":"error","status":"failed","message":"Installation failed — check logs on target system"}' > /dev/null 2>&1 || true
      ERR_DIR="/var/log/macpro-install"
      mkdir -p "$ERR_DIR" 2>/dev/null || true
      dmesg > "$ERR_DIR/error-dmesg.log" 2>/dev/null || true
      journalctl -b > "$ERR_DIR/error-journalctl.log" 2>/dev/null || true
      cat /run/macpro.log > "$ERR_DIR/error-macpro.log" 2>/dev/null || true
      dkms status > "$ERR_DIR/error-dkms-status.log" 2>/dev/null || true
      lsmod > "$ERR_DIR/error-lsmod.log" 2>/dev/null || true
      lspci -nn > "$ERR_DIR/error-lspci.log" 2>/dev/null || true
      for _logdir in /var/log/installer /var/log/install-logs-*; do
        if [ -d "$_logdir" ]; then
          cp -r "$_logdir" "$ERR_DIR/" 2>/dev/null || true
        fi
      done
      CIDATA=""
      for _cidata_mp in /cdrom /isodevice /mnt; do
        if [ -d "$_cidata_mp/macpro-pkgs" ]; then
          CIDATA="$_cidata_mp"
          break
        fi
      done
      if [ -n "$CIDATA" ] && [ -d "$CIDATA" ]; then
        mkdir -p "$CIDATA/logs" 2>/dev/null || true
        cp -r "$ERR_DIR/"* "$CIDATA/logs/" 2>/dev/null || true
        cp /run/macpro.log "$CIDATA/logs/error-macpro.log" 2>/dev/null || true
      fi
      if [ -d /target ]; then
        mkdir -p /target/var/log/macpro-install 2>/dev/null || true
        cp "$ERR_DIR/"* /target/var/log/macpro-install/ 2>/dev/null || true
      fi

  shutdown: reboot