      wh '{"progress":80,"stage":"late-mdns","status":"configuring","message":"Configuring mDNS hostname resolution"}'
      if grep -q '^hosts:' /target/etc/nsswitch.conf; then
        sed -i 's/^hosts:.*/hosts: files mdns_minimal [NOTFOUND=return] dns/' /target/etc/nsswitch.conf
      else
        echo 'hosts: files mdns_minimal [NOTFOUND=return] dns' >> /target/etc/nsswitch.conf
      fi
      wh '{"progress":83,"stage":"late-mdns","status":"configured","message":"mDNS hostname resolution configured"}'

    - |
      # sh -c block — must redefine helpers (wh/die/log)
      KVER="$(uname -r)"
      ABI_VER="${KVER%-generic}"
      LOG="/run/macpro.log"
      WHURL="__WHURL__"
      wh() { curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d "$1" > /dev/null 2>&1 || true; }
      diag() { echo "=== DIAG ===" > /dev/console 2>/dev/null; lsmod 2>/dev/null | grep -E "wl|cfg80211" > /dev/console 2>/dev/null; ip link show > /dev/console 2>/dev/null; ip addr show > /dev/console 2>/dev/null; iwconfig > /dev/console 2>/dev/null; cat /etc/netplan/*.yaml > /dev/console 2>/dev/null 2>&1; which wpa_supplicant > /dev/console 2>/dev/null; dkms status > /dev/console 2>/dev/null; dmesg 2>/dev/null | grep -iE "wl|broadcom|wifi" | tail -5 > /dev/console 2>/dev/null; cat "$LOG" > /dev/console 2>/dev/null; }
      die() { echo "[late] FATAL: $1" >> "$LOG"; wh "{\"progress\":${2:-85},\"stage\":\"late\",\"status\":\"failed\",\"message\":\"FATAL: $1 — diag dumped to console\"}"; diag; exit 1; }
      log() { echo "[late] $1" >> "$LOG"; }

      wh '{"progress":85,"stage":"late-hold","status":"configuring","message":"Pinning kernel version and disabling auto-updates"}'
      chroot /target apt-mark hold "linux-image-${KVER}" 2>>"$LOG" || die "Failed to hold linux-image-${KVER} — kernel update would break WiFi" 85
      chroot /target apt-mark hold "linux-headers-${KVER}" 2>>"$LOG" || die "Failed to hold linux-headers-${KVER}" 85
      chroot /target apt-mark hold "linux-modules-${KVER}" 2>>"$LOG" || die "Failed to hold linux-modules-${KVER}" 85
      chroot /target apt-mark hold "linux-modules-extra-${KVER}" 2>>"$LOG" || echo "[late] WARN: linux-modules-extra hold failed (may not exist)" >> "$LOG"
      # Disable all automatic updates — kernel updates would break the WiFi driver
      # Only packages from the ISO should be installed during or after installation
      mkdir -p /target/etc/apt/apt.conf.d
      printf 'APT::Periodic::Update-Package-Lists "0";\nAPT::Periodic::Unattended-Upgrade "0";\nAPT::Periodic::Download-Upgradeable-Packages "0";\n' > /target/etc/apt/apt.conf.d/20auto-upgrades
      printf 'Unattended-Upgrade::Allowed-Origins { };\n' > /target/etc/apt/apt.conf.d/50unattended-upgrades
      # Disable cloud-init apt operations to prevent first-boot kernel upgrades
      mkdir -p /target/etc/cloud/cloud.cfg.d
      printf 'apt:\n  preserve_sources_list: true\n  upgrade: false\n' > /target/etc/cloud/cloud.cfg.d/99-disable-apt-upgrade.cfg
      # Disable cloud-init network config to prevent it from overwriting our netplan on first boot
      printf 'network: {config: disabled}\n' > /target/etc/cloud/cloud.cfg.d/99-disable-network-config.cfg
      # Mask apt-daily timers to prevent background apt operations
      chroot /target systemctl mask apt-daily.service 2>>"$LOG" || true
      chroot /target systemctl mask apt-daily.timer 2>>"$LOG" || true
      chroot /target systemctl mask apt-daily-upgrade.service 2>>"$LOG" || true
      chroot /target systemctl mask apt-daily-upgrade.timer 2>>"$LOG" || true
      # Disable release upgrades completely
      mkdir -p /target/etc/update-manager
      printf 'Prompt=never\n' > /target/etc/update-manager/release-upgrades
      # Comment out apt sources to prevent any package installation post-boot
      # User can manually uncomment to enable apt if needed
      if [ -f /target/etc/apt/sources.list ]; then
        sed -i '/^deb/ s/^/#/' /target/etc/apt/sources.list 2>>"$LOG" || true
      fi
      for _list in /target/etc/apt/sources.list.d/*.list; do
        [ -f "$_list" ] || continue
        sed -i '/^deb/ s/^/#/' "$_list" 2>>"$LOG" || true
      done
      for _src in /target/etc/apt/sources.list.d/*.sources; do
        [ -f "$_src" ] || continue
        sed -i 's/^Types:.*/Types:/' "$_src" 2>>"$LOG" || true
      done
      # Disable snap auto-refresh if snap is present
      if chroot /target which snap 2>/dev/null; then
        chroot /target snap refresh --hold=forever 2>>"$LOG" || true
      fi
      # Kernel pin preferences applied post-install (pin-priority: -1 in apt.preferences blocks curtin kernel install)
      mkdir -p /target/etc/apt/preferences.d
      printf "Package: linux-image-*\nPin: release o=Ubuntu\nPin-Priority: -1\n\nPackage: linux-headers-*\nPin: release o=Ubuntu\nPin-Priority: -1\n\nPackage: linux-modules-*\nPin: release o=Ubuntu\nPin-Priority: -1\n\nPackage: linux-image-${ABI_VER}*\nPin: release o=Ubuntu\nPin-Priority: 1001\n\nPackage: linux-headers-${ABI_VER}*\nPin: release o=Ubuntu\nPin-Priority: 1001\n\nPackage: linux-modules-${ABI_VER}*\nPin: release o=Ubuntu\nPin-Priority: 1001\n" > /target/etc/apt/preferences.d/99-pin-kernel
      wh '{"progress":87,"stage":"late-hold","status":"pinned","message":"Kernel version pinned, all auto-updates disabled, apt sources commented out"}'

    - |
      # sh -c block — must redefine helpers (wh/die/log)
      LOG="/run/macpro.log"
      WHURL="__WHURL__"
      wh() { curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d "$1" > /dev/null 2>&1 || true; }
      diag() { echo "=== DIAG ===" > /dev/console 2>/dev/null; lsmod 2>/dev/null | grep -E "wl|cfg80211" > /dev/console 2>/dev/null; ip link show > /dev/console 2>/dev/null; ip addr show > /dev/console 2>/dev/null; iwconfig > /dev/console 2>/dev/null; cat /etc/netplan/*.yaml > /dev/console 2>/dev/null 2>&1; which wpa_supplicant > /dev/console 2>/dev/null; dkms status > /dev/console 2>/dev/null; dmesg 2>/dev/null | grep -iE "wl|broadcom|wifi" | tail -5 > /dev/console 2>/dev/null; cat "$LOG" > /dev/console 2>/dev/null; }
      die() { echo "[late] FATAL: $1" >> "$LOG"; wh "{\"progress\":${2:-88},\"stage\":\"late\",\"status\":\"failed\",\"message\":\"FATAL: $1 — diag dumped to console\"}"; diag; exit 1; }
      log() { echo "[late] $1" >> "$LOG"; }

      wh '{"progress":88,"stage":"late-firewall","status":"configuring","message":"Configuring firewall"}'
      if chroot /target which ufw 2>/dev/null; then
        chroot /target ufw default deny incoming 2>>"$LOG" || true
        chroot /target ufw allow 22/tcp 2>>"$LOG" || true
        chroot /target ufw --force enable 2>>"$LOG" || true
      else
        log "WARN: ufw not found in target (install may have failed)"
      fi

    - |
      # sh -c block — must redefine helpers (wh/die/log)
      LOG="/run/macpro.log"
      WHURL="__WHURL__"
      wh() { curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d "$1" > /dev/null 2>&1 || true; }
      diag() { echo "=== DIAG ===" > /dev/console 2>/dev/null; lsmod 2>/dev/null | grep -E "wl|cfg80211" > /dev/console 2>/dev/null; ip link show > /dev/console 2>/dev/null; ip addr show > /dev/console 2>/dev/null; iwconfig > /dev/console 2>/dev/null; cat /etc/netplan/*.yaml > /dev/console 2>/dev/null 2>&1; which wpa_supplicant > /dev/console 2>/dev/null; dkms status > /dev/console 2>/dev/null; dmesg 2>/dev/null | grep -iE "wl|broadcom|wifi" | tail -5 > /dev/console 2>/dev/null; cat "$LOG" > /dev/console 2>/dev/null; }
      die() { echo "[late] FATAL: $1" >> "$LOG"; wh "{\"progress\":${2:-90},\"stage\":\"late\",\"status\":\"failed\",\"message\":\"FATAL: $1 — diag dumped to console\"}"; diag; exit 1; }
      log() { echo "[late] $1" >> "$LOG"; }

      wh '{"progress":90,"stage":"late-sudo","status":"configuring","message":"Configuring sudo for user __USERNAME__"}'
      echo "__USERNAME__ ALL=(ALL) NOPASSWD:ALL" > "/target/etc/sudoers.d/__USERNAME__"
      chmod 440 "/target/etc/sudoers.d/__USERNAME__"

    - |
      # sh -c block — must redefine helpers (wh/die/log) AND rediscover CIDATA
      LOG="/run/macpro.log"
      WHURL="__WHURL__"
      CIDATA=""
      for _cidata_mp in /cdrom /isodevice /mnt; do
        if [ -d "$_cidata_mp/macpro-pkgs" ]; then
          CIDATA="$_cidata_mp"
          break
        fi
      done
      CIDATA_LOG_DIR="${CIDATA}/logs"
      wh() { curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d "$1" > /dev/null 2>&1 || true; }
      diag() { echo "=== DIAG ===" > /dev/console 2>/dev/null; lsmod 2>/dev/null | grep -E "wl|cfg80211" > /dev/console 2>/dev/null; ip link show > /dev/console 2>/dev/null; ip addr show > /dev/console 2>/dev/null; iwconfig > /dev/console 2>/dev/null; cat /etc/netplan/*.yaml > /dev/console 2>/dev/null 2>&1; which wpa_supplicant > /dev/console 2>/dev/null; dkms status > /dev/console 2>/dev/null; dmesg 2>/dev/null | grep -iE "wl|broadcom|wifi" | tail -5 > /dev/console 2>/dev/null; cat "$LOG" > /dev/console 2>/dev/null; }
      die() { echo "[late] FATAL: $1" >> "$LOG"; wh "{\"progress\":${2:-97},\"stage\":\"late\",\"status\":\"failed\",\"message\":\"FATAL: $1 — diag dumped to console\"}"; diag; exit 1; }
      log() { echo "[late] $1" >> "$LOG"; }

      wh '{"progress":95,"stage":"late-logs","status":"saving","message":"Saving installation logs"}'
      mkdir -p /target/var/log/macpro-install
      cp /run/macpro.log /target/var/log/macpro-install/early-commands.log || true
      dmesg > /target/var/log/macpro-install/dmesg.log || true
      # Also sync logs to CIDATA (survives reboot — readable from macOS)
      if [ -n "$CIDATA" ] && [ -d "$CIDATA" ]; then
        mkdir -p "$CIDATA_LOG_DIR" 2>/dev/null || true
        cp /run/macpro.log "$CIDATA_LOG_DIR/macpro-late.log" 2>/dev/null || true
        cp /target/var/log/macpro-install/early-commands.log "$CIDATA_LOG_DIR/" 2>/dev/null || true
        dmesg > "$CIDATA_LOG_DIR/dmesg-late.log" 2>/dev/null || true
        # Copy curtin/subiquity installer logs if they exist
        for _logdir in /var/log/installer /var/log; do
          for _log in curtin-install.log curtin.log subiquity-server.log syslog; do
            if [ -f "$_logdir/$_log" ]; then
              cp "$_logdir/$_log" "$CIDATA_LOG_DIR/" 2>/dev/null || true
            fi
          done
        done
      fi

      wh '{"progress":97,"stage":"late-verify","status":"verifying","message":"Verifying target system before reboot"}'

      log "Verifying target system integrity..."
      VERIFY_OK=true
      WIFI_OK=true
      if ! ls /target/boot/vmlinuz-* 1>/dev/null 2>&1; then
        log "WARN: No kernel found in /target"
        VERIFY_OK=false
      fi
      if [ ! -f /target/etc/netplan/01-wifi.yaml ] && ! ls /target/etc/netplan/*-wifi*.yaml >/dev/null 2>&1; then
        log "FATAL: No WiFi netplan config in /target — no network after reboot"
        WIFI_OK=false
        VERIFY_OK=false
      fi
      WIFI_MODULE_FOUND=false
      if ls /target/lib/modules/*/updates/dkms/wl.ko* 2>/dev/null | head -1 > /dev/null 2>&1; then
        WIFI_MODULE_FOUND=true
      elif ls /target/lib/modules/*/extra/wl.ko* 2>/dev/null | head -1 > /dev/null 2>&1; then
        WIFI_MODULE_FOUND=true
      fi
      if [ "$WIFI_MODULE_FOUND" = "false" ]; then
        log "FATAL: No WiFi driver module in /target — no network after reboot"
        WIFI_OK=false
        VERIFY_OK=false
      fi
      CFG80211_FOUND=false
      if ls /target/lib/modules/*/kernel/net/wireless/cfg80211.ko* 2>/dev/null | head -1 > /dev/null 2>&1; then
        CFG80211_FOUND=true
      fi
      if [ "$CFG80211_FOUND" = "false" ]; then
        log "FATAL: No cfg80211 module in /target — wl driver will fail to load"
        WIFI_OK=false
        VERIFY_OK=false
      fi
      if [ -f /target/etc/default/grub.d/macpro.cfg ]; then
        if ! grep -q 'nomodeset' /target/etc/default/grub.d/macpro.cfg; then
          log "WARN: GRUB nomodeset param missing in target"
          VERIFY_OK=false
        fi
      else
        log "WARN: GRUB macpro.cfg missing in target"
        VERIFY_OK=false
      fi
      if [ "$VERIFY_OK" = "false" ]; then
        if [ "$WIFI_OK" = "false" ]; then
          # WiFi is broken in target — DON'T reboot, keep SSH alive for debugging
          log "FATAL: Target system WiFi is broken — NOT rebooting to avoid headless brick"
          wh '{"progress":97,"stage":"late-verify","status":"failed","message":"FATAL: Target WiFi broken — SSH remains active, NOT rebooting"}'
          # Keep SSH server running for remote debugging
          if [ -f /usr/sbin/sshd ] && ! pgrep -x sshd >/dev/null 2>&1; then
            /usr/sbin/sshd -D -e &
          fi
          # Block indefinitely so system doesn't reboot into broken state
          while true; do sleep 60; done
        else
          log "WARN: Some non-critical verification checks failed — proceeding with reboot"
          wh '{"progress":97,"stage":"late-verify","status":"warning","message":"WARN: Some verification checks failed but WiFi OK"}'
        fi
      else
        log "All verification checks passed"
        wh '{"progress":98,"stage":"late-verify","status":"verified","message":"Target system verification passed"}'
      fi
      wh '{"progress":100,"stage":"complete","status":"done","message":"Installation complete — rebooting"}'

  error-commands:
    - |
      WHURL="__WHURL__"
      wh() { curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d "$1" > /dev/null 2>&1 || true; }

      modprobe wl 2>/dev/null || true
      sleep 3
      WIFI_DEV=$(ip link show 2>/dev/null | grep -oE 'wl[^:]+' | head -1)
      [ -n "$WIFI_DEV" ] && ip link set "$WIFI_DEV" up 2>/dev/null || true
    - |
      WHURL="__WHURL__"
      wh() { curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d "$1" > /dev/null 2>&1 || true; }
      LOG="/run/macpro.log"
      _dump_log() { cat "$LOG" > /dev/console 2>/dev/null || true; }
      trap '_dump_log' EXIT

      wh '{"progress":0,"stage":"error","status":"failed","message":"Installation failed — check logs on target system"}'
      ERR_DIR="/var/log/macpro-install"
      mkdir -p "$ERR_DIR" 2>/dev/null || true
      dmesg > "$ERR_DIR/error-dmesg.log" 2>/dev/null || true
      journalctl -b > "$ERR_DIR/error-journalctl.log" 2>/dev/null || true
      cat /run/macpro.log > "$ERR_DIR/error-macpro.log" 2>/dev/null || true
      dkms status > "$ERR_DIR/error-dkms-status.log" 2>/dev/null || true
      lsmod > "$ERR_DIR/error-lsmod.log" 2>/dev/null || true
      lspci -nn > "$ERR_DIR/error-lspci.log" 2>/dev/null || true
      # Copy curtin/subiquity crash logs
      for _logdir in /var/log/installer /var/log/install-logs-*; do
        if [ -d "$_logdir" ]; then
          cp -r "$_logdir" "$ERR_DIR/" 2>/dev/null || true
        fi
      done
      # Sync ALL error logs to CIDATA (survives reboot — readable from macOS)
      CIDATA=""
      for _cidata_mp in /cdrom /isodevice /mnt; do
        if [ -d "$_cidata_mp/macpro-pkgs" ]; then
          CIDATA="$_cidata_mp"
          break
        fi
      done
      if [ -n "$CIDATA" ] && [ -d "$CIDATA" ]; then
        mkdir -p "$CIDATA/logs" 2>/dev/null || true
        cp -r "$ERR_DIR/"* "$CIDATA/logs/" 2>/dev/null || true
        cp /run/macpro.log "$CIDATA/logs/error-macpro.log" 2>/dev/null || true
      fi
      if [ -d /target ]; then
        mkdir -p /target/var/log/macpro-install 2>/dev/null || true
        cp "$ERR_DIR/"* /target/var/log/macpro-install/ 2>/dev/null || true
      fi

      exit 1

  # NOTE: Using reboot (not poweroff) because headless deployment requires
  # remote access after installation completes. The GPU cold-boot quirk
  # (AMD FirePro needs cold boot for init) only affects macOS→Linux transitions,
  # not Linux→Linux reboots. If GPU issues occur on first boot, add
  # nomodeset amdgpu.si.modeset=0 to GRUB (already done in late-commands).
  # SAFETY: If late-commands verification detects broken WiFi in /target,
  # the system enters recovery mode (blocks reboot, keeps SSH alive) to
  # prevent a headless brick scenario where the installed system has no
  # network access.
  shutdown: reboot