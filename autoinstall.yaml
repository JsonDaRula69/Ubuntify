autoinstall:
  version: 1

  refresh-installer:
    update: false

  kernel:
    package: linux-image-6.8.0-100-generic

  timezone: America/Los_Angeles

  apt:
    preserve_sources_list: true
    # Kernel pin preferences moved to late-commands — pin-priority: -1 here blocks curtin from installing the kernel

  identity:
    hostname: macpro-linux
    username: teja
    realname: Teja
    password: "$6$8PBS0yfUxUSfQKeT$E/vFyIsiCGGe3iJ5GskGXYRdf4/9FSE1KugDfQvjf2Rp3ZwCprpDgVRKyzCZIZJKBKX2iEB6T5krscDlnRqq81"

  ssh:
    install-server: true
    allow-pw: true
    authorized-keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHC+HpN9l4rWjhILAseecXpN5xVe4eYxAKgf6RjsoJwi remote-access-20250923
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGceithSleqWG+lmbCb+8fI9lRQqN/Fho8ZN/E6X2Fx3 llorderbot-remote-deploy
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJ2yBFJ3qh6zUR5Xi9IK17YMlrr57DgWOQBdCUywr3GH djtchill@Ch3atC0de
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOQ37O+h9gTmyE/z8eWMWflSDEzbZz/ojoEkalinYc06

  reporting:
    builtin:
      type: print
    macpro-monitor:
      type: webhook
      endpoint: "http://192.168.1.115:8080/webhook"
      level: DEBUG

  early-commands:
    - |
      set -x
      LOG="/run/macpro.log"
      WHURL="http://192.168.1.115:8080/webhook"
      wh() { curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d "$1" > /dev/null 2>&1 || true; }
      die() { echo "[early] FATAL: $1" >> "$LOG"; wh "{\"progress\":${2:-0},\"stage\":\"early\",\"status\":\"failed\",\"message\":\"FATAL: $1\"}"; exit 1; }
      log() { echo "[early] $1" >> "$LOG"; }
      _dump_log() { cat "$LOG" > /dev/console 2>/dev/null || true; }
      trap '_dump_log' EXIT

      # Verify target disk exists and is the only internal disk
      if [ ! -e /dev/sda ]; then
        die "/dev/sda not found — cannot proceed with storage config" 2
      fi
      INTERNAL_COUNT=$(lsblk -d -n -o TYPE,NAME 2>/dev/null | grep -c 'disk' || echo "0")
      if [ "$INTERNAL_COUNT" -gt 1 ]; then
        log "WARN: Multiple disks detected — verify /dev/sda is the correct target"
      fi
      if lsblk -o FSTYPE /dev/sda 2>/dev/null | grep -q apfs; then
        log "macOS APFS partition detected — dual-boot preserve mode active"
      else
        log "WARN: No macOS APFS partition found — dual-boot may not be configured"
      fi
      KVER="$(uname -r)"
      ABI_VER="${KVER%-generic}"
      PKGS=""
      for _mp in /cdrom /isodevice /mnt; do
        if [ -d "$_mp/macpro-pkgs" ]; then
          PKGS="$_mp/macpro-pkgs"
          break
        fi
      done
      if [ -z "$PKGS" ]; then
        die "Cannot find macpro-pkgs on any mount point" 2
      fi

      echo "=== MAC PRO 2013 AUTOINSTALL ===" > "$LOG"
      echo "Kernel: $(uname -r)" >> "$LOG"
      echo "Target: $KVER" >> "$LOG"
      echo "Packages: $(ls $PKGS/*.deb 2>/dev/null | wc -l) debs" >> "$LOG"

      # Validate kernel headers exist for running kernel
      wh '{"progress":2,"stage":"prep-init","status":"running","message":"Autoinstall started — validating kernel headers"}'
      if ! ls $PKGS/linux-headers-${ABI_VER}_*.deb 1>/dev/null 2>&1; then
        die "No kernel headers for $KVER in $PKGS" 2
      fi
      # Validate DKMS patches exist — driver WILL NOT compile on kernel 6.8+ without them
      if [ ! -d "$PKGS/dkms-patches" ] || [ ! -f "$PKGS/dkms-patches/series" ]; then
        die "DKMS patches missing — broadcom-sta cannot compile on kernel 6.8+" 2
      fi

      # Install kernel headers
      wh '{"progress":5,"stage":"prep-headers","status":"installing","message":"Installing kernel headers"}'
      log "Installing kernel headers..."
      dpkg --force-depends --skip-same-version -i $PKGS/linux-headers-${ABI_VER}_*.deb \
              $PKGS/linux-headers-${KVER}_*.deb \
              $PKGS/linux-libc-dev_*.deb 2>>"$LOG" || { die "kernel headers install failed" 5; }

      # Install build toolchain
      wh '{"progress":10,"stage":"prep-toolchain","status":"installing","message":"Installing build toolchain (gcc, make, binutils)"}'
      log "Installing build toolchain..."
      dpkg --force-depends --skip-same-version -i $PKGS/binutils-common_*.deb $PKGS/libbinutils_*.deb \
              $PKGS/libctf-nobfd0_*.deb $PKGS/libctf0_*.deb \
              $PKGS/libsframe1_*.deb $PKGS/libgprofng0_*.deb \
              $PKGS/binutils_*.deb $PKGS/binutils-x86-64-linux-gnu_*.deb \
              $PKGS/libgcc-s1_*.deb $PKGS/gcc-13-base_*.deb \
              $PKGS/libisl23_*.deb $PKGS/libmpc3_*.deb $PKGS/libmpfr6_*.deb \
              $PKGS/libgcc-13-dev_*.deb $PKGS/cpp-13_*.deb \
              $PKGS/libcc1-0_*.deb $PKGS/cpp-13-x86-64-linux-gnu_*.deb \
              $PKGS/gcc-13-x86-64-linux-gnu_*.deb $PKGS/gcc-13_*.deb \
              $PKGS/libstdc++6_*.deb $PKGS/libstdc++-13-dev_*.deb \
              $PKGS/libc-dev-bin_*.deb $PKGS/libc6-dev_*.deb \
              $PKGS/libc-devtools_*.deb $PKGS/libcrypt-dev_*.deb \
              $PKGS/rpcsvc-proto_*.deb \
              $PKGS/make_*.deb $PKGS/build-essential_*.deb \
              $PKGS/fakeroot_*.deb $PKGS/libfakeroot_*.deb \
              $PKGS/patch_*.deb 2>>"$LOG" || { die "build toolchain install failed" 10; }

      # Install DKMS and Broadcom driver source
      wh '{"progress":13,"stage":"prep-dkms","status":"installing","message":"Installing DKMS and Broadcom driver source"}'
      log "Installing DKMS and Broadcom driver source..."
      # broadcom-sta-dkms postinst auto-runs 'dkms add' which may try to build
      # without patches, returning non-zero. This is expected — we apply patches
      # after dpkg and build manually. So || true here, not fatal.
      dpkg --force-depends --skip-same-version -i $PKGS/dkms_*.deb $PKGS/broadcom-sta-dkms_*.deb 2>>"$LOG" || log "WARN: dkms/broadcom dpkg returned non-zero (expected if postinst dkms build fails before patches)"
      # dkms add is handled by dpkg postinst; postinst may auto-trigger dkms build — clean before patching
      dkms remove broadcom-sta/6.30.223.271 -k "$KVER" 2>/dev/null || true

      # Apply DKMS patches for kernel 6.8+ compatibility
      if [ -d "$PKGS/dkms-patches" ]; then
        log "Applying DKMS compatibility patches..."
        # Pre-validate ALL patch files exist before applying any
        _missing=0
        for _p in $(grep -vE '^\s*$|^\s*#' "$PKGS/dkms-patches/series"); do
          if [ ! -f "$PKGS/dkms-patches/$_p" ]; then
            log "FATAL: Patch '$_p' listed in series but not found"
            _missing=1
          fi
        done
        if [ "$_missing" -eq 1 ]; then
          die "DKMS patch files missing from series" 14
        fi
        for patch in $(grep -vE '^\s*$|^\s*#' "$PKGS/dkms-patches/series"); do
          if [ -f "$PKGS/dkms-patches/$patch" ]; then
            log "Applying $patch..."
            if ! patch -p1 -d /usr/src/broadcom-sta-6.30.223.271 < "$PKGS/dkms-patches/$patch" >> "$LOG" 2>&1; then
              die "DKMS patch $patch failed to apply" 14
            fi
          else
            die "Patch file $patch listed in series but not found" 14
          fi
        done
      else
        log "WARN: No DKMS patches directory found"
      fi

      # Build wl driver via DKMS
      wh '{"progress":15,"stage":"prep-build","status":"building","message":"Compiling wl driver via DKMS"}'
      log "Building wl driver via DKMS..."
      ln -sf /usr/bin/x86_64-linux-gnu-gcc-13 /usr/bin/cc 2>/dev/null || ln -sf /usr/bin/gcc-13 /usr/bin/cc 2>/dev/null || true
      if ! dkms build broadcom-sta/6.30.223.271 -k "$KVER" 2>>"$LOG"; then
        log "WARN: dkms build failed, retrying after clean..."
        dkms remove broadcom-sta/6.30.223.271 -k "$KVER" 2>/dev/null || true
        sleep 2
        if ! dkms build broadcom-sta/6.30.223.271 -k "$KVER" 2>>"$LOG"; then
          die "dkms build failed on retry" 15
        fi
      fi
      if ! dkms install broadcom-sta/6.30.223.271 -k "$KVER" 2>>"$LOG"; then
        log "WARN: dkms install failed, retrying..."
        sleep 2
        if ! dkms install broadcom-sta/6.30.223.271 -k "$KVER" 2>>"$LOG"; then
          die "dkms install failed on retry" 15
        fi
      fi

      # Blacklist conflicting drivers and load wl
      for drv in b43 ssb bcma brcmsmac; do
          echo "blacklist $drv"
      done >> /etc/modprobe.d/blacklist-bcm.conf
      rmmod b43 ssb bcma brcmsmac 2>/dev/null || true
      log "Loading wl module..."
      modprobe wl 2>>"$LOG" || log "ERROR: modprobe wl failed"
      sleep 5
      if ! lsmod | grep -q wl; then
        log "WARN: wl not loaded, retrying after forcing conflicting drivers off..."
        for drv in b43 ssb bcma brcmsmac wl; do rmmod $drv 2>/dev/null || true; done
        modprobe wl 2>>"$LOG" || log "ERROR: modprobe wl retry failed"
        sleep 5
      fi
      if lsmod | grep -q wl; then
        log "SUCCESS: wl module loaded"
        wh '{"progress":18,"stage":"prep-wifi","status":"loaded","message":"WiFi driver loaded successfully"}'
      else
        die "wl module not in lsmod — cannot continue without WiFi driver" 18
      fi

      # Detect WiFi interface
      wh '{"progress":20,"stage":"prep-wifi","status":"detecting","message":"Detecting WiFi interface"}'
      log "Detecting WiFi interface..."
      WIFI_IFACE=""
      for i in $(seq 1 60); do
        WIFI_IFACE=$(ip link show 2>/dev/null | grep -oE 'wl[^:]+' | head -1)
        [ -n "$WIFI_IFACE" ] && break
        sleep 1
      done
      log "WiFi interface: ${WIFI_IFACE:-not found}"
      if [ -n "$WIFI_IFACE" ]; then
        sleep 3
        log "WiFi interface settled, checking connectivity..."
      fi
      if [ -z "$WIFI_IFACE" ]; then
        die "No WiFi interface detected after 60s — cannot continue" 20
      fi
      wh "{\"progress\":22,\"stage\":\"prep-wifi\",\"status\":\"online\",\"message\":\"WiFi interface detected: ${WIFI_IFACE}\"}"

      # Write netplan for live environment with detected interface name
      # (networkd does not support match: for wifis — must use actual interface name)
      rm -f /etc/netplan/50-cloud-init.yaml 2>/dev/null || true
      { printf "network:\n"; printf "  version: 2\n"; printf "  renderer: networkd\n"; printf "  wifis:\n"; printf "    %s:\n" "$WIFI_IFACE"; printf "      dhcp4: true\n"; printf "      optional: true\n"; printf "      access-points:\n"; printf "        __WIFI_SSID__:\n"; printf "          password: __WIFI_PASSWORD__\n"; } > /etc/netplan/01-wifi.yaml
      chmod 600 /etc/netplan/01-wifi.yaml
      log "Live netplan written for interface: $WIFI_IFACE"
      if command -v netplan 2>/dev/null >/dev/null; then
        if ! netplan generate 2>>"$LOG"; then
          log "WARN: netplan generate failed — retrying after 3s"
          sleep 3
          if ! netplan generate 2>>"$LOG"; then
            die "netplan generate failed (twice) — WiFi config may be invalid" 22
          fi
        fi
        if ! netplan apply 2>>"$LOG"; then
          log "WARN: netplan apply failed — retrying after 3s"
          sleep 3
          netplan apply 2>>"$LOG" || die "netplan apply failed (twice) — cannot bring up WiFi" 22
        fi
      fi

      # Start SSH server for remote debugging
      wh '{"progress":23,"stage":"prep-ssh","status":"starting","message":"Starting SSH server for remote debugging"}'
      log "Starting SSH server for remote debugging..."
      dpkg --force-depends -i /cdrom/pool/restricted/o/openssh/openssh-server_*.deb /cdrom/pool/restricted/o/openssh/openssh-sftp-server_*.deb 2>>"$LOG" || true
      if [ ! -f /usr/sbin/sshd ]; then
        dpkg --force-depends -i /isodevice/pool/restricted/o/openssh/openssh-server_*.deb /isodevice/pool/restricted/o/openssh/openssh-sftp-server_*.deb 2>>"$LOG" || true
      fi
      if [ -f /usr/sbin/sshd ]; then
        # Create installer user for SSH access (ssh: install-server only applies to target)
        useradd -m -s /bin/bash ubuntu 2>/dev/null || true
        echo "ubuntu:ubuntu" | chpasswd 2>/dev/null || true
        mkdir -p /home/ubuntu/.ssh 2>/dev/null || true
        : > /home/ubuntu/.ssh/authorized_keys 2>/dev/null || true
        for _key in "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHC+HpN9l4rWjhILAseecXpN5xVe4eYxAKgf6RjsoJwi remote-access-20250923" "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGceithSleqWG+lmbCb+8fI9lRQqN/Fho8ZN/E6X2Fx3 llorderbot-remote-deploy" "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJ2yBFJ3qh6zUR5Xi9IK17YMlrr57DgWOQBdCUywr3GH djtchill@Ch3atC0de" "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOQ37O+h9gTmyE/z8eWMWflSDEzbZz/ojoEkalinYc06"; do
          echo "$_key" >> /home/ubuntu/.ssh/authorized_keys 2>/dev/null || true
        done
        chmod 700 /home/ubuntu/.ssh 2>/dev/null || true
        chmod 600 /home/ubuntu/.ssh/authorized_keys 2>/dev/null || true
        chown -R ubuntu:ubuntu /home/ubuntu/.ssh 2>/dev/null || true
        mkdir -p /run/sshd
        /usr/sbin/sshd -D -e &
        log "SSH server started (installer user: ubuntu, pass: ubuntu; target user: teja)"
        wh '{"progress":25,"stage":"prep-ssh","status":"ready","message":"SSH server ready — early-commands complete"}'
      else
        log "WARNING: Could not start SSH server"
      fi

      # Verify WiFi is associated (scan check for faster feedback)
      WIFI_ASSOC=0
      for _i in $(seq 1 6); do
        _essid=$(iwconfig "$WIFI_IFACE" 2>/dev/null | grep -oE 'ESSID:"[^"]+"' | head -1)
        if [ -n "$_essid" ]; then
          WIFI_ASSOC=1
          break
        fi
        sleep 5
      done
      if [ "$WIFI_ASSOC" -ne 1 ]; then
        iwlist "$WIFI_IFACE" scan 2>/dev/null | head -20 >> "$LOG" || true
        log "WARN: WiFi not associated after 30s — check SSID/password"
      fi
      # Check for DHCP lease (exclude link-local 169.254.x.x which indicates DHCP failure)
      for _i in $(seq 1 6); do
        if ip addr show "$WIFI_IFACE" 2>/dev/null | grep -q "inet " && ! ip addr show "$WIFI_IFACE" 2>/dev/null | grep -q "inet 169\.254\."; then
          break
        fi
        sleep 5
      done

      # Verify WiFi connectivity before storage proceeds
      wh '{"progress":26,"stage":"prep-netcheck","status":"verifying","message":"Verifying WiFi connectivity before storage"}'
      log "Verifying WiFi network connectivity..."
      NET_OK=0
      for i in $(seq 1 12); do
        if curl -s -m 5 -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":27,"stage":"prep-netcheck","status":"testing","message":"Network connectivity test"}' > /dev/null 2>&1; then
          NET_OK=1
          break
        fi
        sleep 5
      done
      if [ "$NET_OK" -eq 1 ]; then
        log "Network connectivity verified"
        wh '{"progress":28,"stage":"prep-netcheck","status":"verified","message":"WiFi connectivity confirmed — safe to proceed with storage"}'
      else
        log "WARN: WiFi connectivity test failed — attempting reconnect..."
        for drv in b43 ssb bcma brcmsmac wl; do rmmod $drv 2>/dev/null || true; done
        sleep 2
        modprobe wl 2>>"$LOG" || true
        sleep 5
        NET_RETRY=0
        for i in $(seq 1 6); do
          if curl -s -m 5 -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":29,"stage":"prep-reconnect","status":"retrying","message":"WiFi reconnect attempt"}' > /dev/null 2>&1; then
            NET_RETRY=1
            break
          fi
          sleep 10
        done
        if [ "$NET_RETRY" -eq 1 ]; then
          log "Network connectivity restored after reconnect"
          wh '{"progress":29,"stage":"prep-reconnect","status":"recovered","message":"WiFi recovered after driver reload"}'
        else
          die "WiFi connectivity test failed after reconnect attempt — cannot proceed with storage wipe" 29
        fi
      fi
      set +x

  # NOTE: This section is intentionally minimal — WiFi netplan is generated
  # in early-commands after wl driver load (networkd doesn't support match: for
  # wifis). For Ethernet installs, generate_autoinstall() injects ethernets: here.
  network:
    version: 2
    renderer: networkd

  packages:
    - openssh-server
    - wpasupplicant
    - curl
    - wireless-tools
    - avahi-daemon
    - libnss-mdns
    - efibootmgr
    - ufw

  # DANGER: This template does NOT include preserve:true on existing partitions.
  # The prepare-deployment.sh script MUST inject preserve:true for all
  # existing macOS/APFS partitions before use. Without that injection,
  # curtin will WIPE existing partitions during autoinstall.
  storage:
    config:
      - type: disk
        id: root-disk
        path: /dev/sda
        ptable: gpt
        preserve: true
        wipe: superblock
      - type: partition
        id: efi-partition
        device: root-disk
        size: 512M
        flag: boot
        partition_type: c12a7328-f81f-11d2-ba4b-00a0c93ec93b
        grub_device: true
      - type: format
        id: efi-format
        volume: efi-partition
        fstype: fat32
      - type: mount
        id: efi-mount
        device: efi-format
        path: /boot/efi
      - type: partition
        id: boot-partition
        device: root-disk
        size: 1G
      - type: format
        id: boot-format
        volume: boot-partition
        fstype: ext4
      - type: mount
        id: boot-mount
        device: boot-format
        path: /boot
      - type: partition
        id: root-partition
        device: root-disk
        size: -1
      - type: format
        id: root-format
        volume: root-partition
        fstype: ext4
      - type: mount
        id: root-mount
        device: root-format
        path: /

  late-commands:
    - |
      KVER="$(uname -r)"
      ABI_VER="${KVER%-generic}"
      LOG="/run/macpro.log"
      WHURL="http://192.168.1.115:8080/webhook"
      wh() { curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d "$1" > /dev/null 2>&1 || true; }
      die() { echo "[late] FATAL: $1" >> "$LOG"; wh "{\"progress\":${2:-29},\"stage\":\"late\",\"status\":\"failed\",\"message\":\"FATAL: $1\"}"; exit 1; }
      log() { echo "[late] $1" >> "$LOG"; }
      _dump_log() { cat "$LOG" > /dev/console 2>/dev/null || true; }
      trap '_dump_log' EXIT

      log "Late commands starting..."
      wh '{"progress":29,"stage":"late-init","status":"running","message":"Late commands started — verifying WiFi health"}'

      # Verify WiFi health in installed system
      WIFI_IFACE_LATE=$(ip link show 2>/dev/null | grep -oE 'wl[^:]+' | head -1)
      if [ -n "$WIFI_IFACE_LATE" ]; then
        if ! ip addr show "$WIFI_IFACE_LATE" 2>/dev/null | grep -q "inet " || ip addr show "$WIFI_IFACE_LATE" 2>/dev/null | grep -q "inet 169\.254\."; then
          log "WARN: WiFi lost IP during storage — attempting reconnect..."
          for drv in b43 ssb bcma brcmsmac wl; do rmmod $drv 2>/dev/null || true; done
          sleep 2
          modprobe wl 2>>"$LOG" || true
          for _i in $(seq 1 12); do
            WIFI_IFACE_LATE=$(ip link show 2>/dev/null | grep -oE 'wl[^:]+' | head -1)
            if [ -n "$WIFI_IFACE_LATE" ] && ip addr show "$WIFI_IFACE_LATE" 2>/dev/null | grep -q "inet " && ! ip addr show "$WIFI_IFACE_LATE" 2>/dev/null | grep -q "inet 169\.254\."; then
              log "WiFi reconnected on $WIFI_IFACE_LATE"
              break
            fi
            sleep 5
          done
          if [ -z "$WIFI_IFACE_LATE" ]; then
            log "FATAL: WiFi reconnect failed — no interface found"
            wh '{"progress":29,"stage":"late-reconnect","status":"failed","message":"FATAL: WiFi lost and cannot reconnect"}'
            if [ -f /usr/sbin/sshd ]; then
              /usr/sbin/sshd -D -e &
            fi
            while true; do sleep 60; done
          elif ! ip addr show "$WIFI_IFACE_LATE" 2>/dev/null | grep -q "inet "; then
            log "FATAL: WiFi reconnect failed — no valid DHCP lease"
            wh '{"progress":29,"stage":"late-reconnect","status":"failed","message":"FATAL: WiFi has no valid IP after reconnect"}'
            if [ -f /usr/sbin/sshd ]; then
              /usr/sbin/sshd -D -e &
            fi
            while true; do sleep 60; done
          elif ip addr show "$WIFI_IFACE_LATE" 2>/dev/null | grep -q "inet 169\.254\."; then
            log "FATAL: WiFi has only link-local address — DHCP lease failed"
            wh '{"progress":29,"stage":"late-reconnect","status":"failed","message":"FATAL: WiFi link-local only — DHCP failed"}'
            if [ -f /usr/sbin/sshd ]; then
              /usr/sbin/sshd -D -e &
            fi
            while true; do sleep 60; done
          fi
        fi
      fi

      # Discover macpro-pkgs mount point
      PKGS=""
      for _mp in /cdrom /isodevice /mnt /target/cdrom; do
        if [ -d "$_mp/macpro-pkgs" ]; then
          PKGS="$_mp/macpro-pkgs"
          break
        fi
      done
      if [ -z "$PKGS" ]; then
        die "Cannot find macpro-pkgs on any mount point" 29
      fi

      # Validate kernel headers and DKMS patches exist
      wh '{"progress":30,"stage":"late-init","status":"running","message":"Validating kernel headers for target DKMS build"}'
      if ! ls $PKGS/linux-headers-${ABI_VER}_*.deb 1>/dev/null 2>&1; then
        die "No matching kernel headers for $KVER in $PKGS" 30
      fi
      if [ ! -d "$PKGS/dkms-patches" ] || [ ! -f "$PKGS/dkms-patches/series" ]; then
        die "DKMS patches missing — broadcom-sta cannot compile on kernel 6.8+" 30
      fi

      # Stage 1: Kernel headers (no deps)
      wh '{"progress":35,"stage":"late-headers","status":"installing","message":"Stage 1/4: Installing kernel headers into target"}'
      dpkg --root /target --force-depends --skip-same-version -i \
        $PKGS/linux-headers-${ABI_VER}_*.deb \
        $PKGS/linux-headers-${KVER}_*.deb \
        $PKGS/linux-libc-dev_*.deb 2>>"$LOG" || { die "Stage 1 (headers) failed" 35; }

      # Stage 2: Base libraries first, then binaries that depend on them
      wh '{"progress":45,"stage":"late-libs","status":"installing","message":"Stage 2/4: Installing base libraries into target"}'
      dpkg --root /target --force-depends --skip-same-version -i \
        $PKGS/binutils-common_*.deb $PKGS/libbinutils_*.deb \
        $PKGS/libctf-nobfd0_*.deb $PKGS/libctf0_*.deb \
        $PKGS/libsframe1_*.deb $PKGS/libgprofng0_*.deb \
        $PKGS/libgcc-s1_*.deb $PKGS/gcc-13-base_*.deb \
        $PKGS/libisl23_*.deb $PKGS/libmpfr6_*.deb $PKGS/libmpc3_*.deb \
        $PKGS/libstdc++6_*.deb $PKGS/libstdc++-13-dev_*.deb \
        $PKGS/libcrypt-dev_*.deb $PKGS/libc-dev-bin_*.deb \
        $PKGS/libc6-dev_*.deb $PKGS/rpcsvc-proto_*.deb \
        $PKGS/libc-devtools_*.deb \
        $PKGS/binutils_*.deb $PKGS/binutils-x86-64-linux-gnu_*.deb \
        $PKGS/libgcc-13-dev_*.deb $PKGS/cpp-13_*.deb \
        $PKGS/libcc1-0_*.deb $PKGS/cpp-13-x86-64-linux-gnu_*.deb \
