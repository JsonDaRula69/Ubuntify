      chmod +x /target/usr/local/bin/wl-poweroff
      # Create systemd service that calls the helper script
      printf '[Unit]\nDescription=Disable WiFi power management\nAfter=network-online.target\nWants=network-online.target\n\n[Service]\nType=oneshot\nExecStart=/usr/local/bin/wl-poweroff\nRemainAfterExit=yes\n\n[Install]\nWantedBy=multi-user.target\n' > /target/etc/systemd/system/wl-poweroff.service
      chroot /target systemctl enable wl-poweroff.service 2>>"$LOG" || log "WARN: wl-poweroff service enable failed"
