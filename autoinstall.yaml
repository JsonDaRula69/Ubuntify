autoinstall:
  version: 1

  refresh-installer:
    update: no

  kernel:
    package: linux-image-6.8.0-100-generic

  timezone: America/Los_Angeles

  apt:
    preserve_sources_list: true
    preferences:
      - package: "linux-image-6.8.0-100*"
        pin: "release o=Ubuntu"
        pin-priority: 1001

  identity:
    hostname: macpro-linux
    username: teja
    realname: Teja
    password: "$6$TmJsc2FI7rBs9ipD$8MuzzFQFKbdwp3nS2AaAtUscGXwZiUWIBmlCLMag71kB2eujqGVb4"

  ssh:
    install-server: true
    allow-pw: true
    authorized-keys:
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIHC+HpN9l4rWjhILAseecXpN5xVe4eYxAKgf6RjsoJwi remote-access-20250923
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIGceithSleqWG+lmbCb+8fI9lRQqN/Fho8ZN/E6X2Fx3 llorderbot-remote-deploy
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIJ2yBFJ3qh6zUR5Xi9IK17YMlrr57DgWOQBdCUywr3GH djtchill@Ch3atC0de
      - ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIOQ37O+h9gTmyE/z8eWMWflSDEzbZz/ojoEkalinYc06

  reporting:
    builtin:
      type: print
    macpro-monitor:
      type: webhook
      endpoint: "http://192.168.1.115:8080/webhook"
      level: DEBUG

  early-commands:
    - |
      set -x
      # Verify target disk exists and is the only internal disk
      if [ ! -e /dev/sda ]; then
        echo "[early] FATAL: /dev/sda not found — cannot proceed with storage config" >> /run/macpro.log
        exit 1
      fi
      INTERNAL_COUNT=$(lsblk -d -n -o TYPE,NAME 2>/dev/null | grep -c 'disk' || echo "0")
      if [ "$INTERNAL_COUNT" -gt 1 ]; then
        echo "[early] WARN: Multiple disks detected — verify /dev/sda is the correct target" >> /run/macpro.log
      fi
      if lsblk -o FSTYPE /dev/sda 2>/dev/null | grep -q apfs; then
        echo "[early] macOS APFS partition detected — dual-boot preserve mode active" >> /run/macpro.log
      else
        echo "[early] WARN: No macOS APFS partition found — dual-boot may not be configured" >> /run/macpro.log
      fi
      KVER="$(uname -r)"
      ABI_VER="${KVER%-generic}"
      PKGS="/cdrom/macpro-pkgs"
      LOG="/run/macpro.log"
      WHURL="http://192.168.1.115:8080/webhook"
      echo "=== MAC PRO 2013 AUTOINSTALL ===" > "$LOG"
      echo "Kernel: $(uname -r)" >> "$LOG"
      echo "Target: $KVER" >> "$LOG"
      echo "Packages: $(ls $PKGS/*.deb 2>/dev/null | wc -l) debs" >> "$LOG"
      curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":2,"stage":"prep-init","status":"running","message":"Autoinstall started — validating kernel headers"}' > /dev/null 2>&1 || true
      # Validate kernel headers exist for running kernel
      if ! ls $PKGS/linux-headers-${ABI_VER}_*.deb 1>/dev/null 2>&1; then
        echo "[early] FATAL: No kernel headers for $KVER in $PKGS" >> "$LOG"
        curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":2,"stage":"prep-init","status":"failed","message":"FATAL: No kernel headers for running kernel"}' > /dev/null 2>&1 || true
        exit 1
      fi
      # Validate DKMS patches exist — driver WILL NOT compile on kernel 6.8+ without them
      if [ ! -d /cdrom/macpro-pkgs/dkms-patches ] || [ ! -f /cdrom/macpro-pkgs/dkms-patches/series ]; then
        echo "[early] FATAL: DKMS patches missing — broadcom-sta cannot compile on kernel 6.8+" >> "$LOG"
        curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":2,"stage":"prep-init","status":"failed","message":"FATAL: DKMS patches missing — driver compilation will fail"}' > /dev/null 2>&1 || true
        exit 1
      fi

      curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":5,"stage":"prep-headers","status":"installing","message":"Installing kernel headers"}' > /dev/null 2>&1 || true
      echo "[early] Installing kernel headers..." >> "$LOG"
      dpkg -i $PKGS/linux-headers-${ABI_VER}_*.deb \
              $PKGS/linux-headers-${KVER}_*.deb \
              $PKGS/linux-libc-dev_*.deb 2>>"$LOG" || { echo "[early] FATAL: kernel headers failed" >> "$LOG"; curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":5,"stage":"prep-headers","status":"failed","message":"FATAL: kernel headers install failed"}' > /dev/null 2>&1 || true; exit 1; }

      curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":10,"stage":"prep-toolchain","status":"installing","message":"Installing build toolchain (gcc, make, binutils)"}' > /dev/null 2>&1 || true
      echo "[early] Installing build toolchain..." >> "$LOG"
      dpkg -i $PKGS/binutils-common_*.deb $PKGS/libbinutils_*.deb \
              $PKGS/libctf-nobfd0_*.deb $PKGS/libctf0_*.deb \
              $PKGS/libsframe1_*.deb $PKGS/libgprofng0_*.deb \
              $PKGS/binutils_*.deb $PKGS/binutils-x86-64-linux-gnu_*.deb \
              $PKGS/libgcc-s1_*.deb $PKGS/gcc-13-base_*.deb \
              $PKGS/libisl23_*.deb $PKGS/libmpc3_*.deb $PKGS/libmpfr6_*.deb \
              $PKGS/libgcc-13-dev_*.deb $PKGS/cpp-13_*.deb $PKGS/gcc-13_*.deb \
              $PKGS/libstdc++6_*.deb $PKGS/libstdc++-13-dev_*.deb \
              $PKGS/libc-dev-bin_*.deb $PKGS/libc6-dev_*.deb \
              $PKGS/libc-devtools_*.deb $PKGS/libcrypt-dev_*.deb \
              $PKGS/rpcsvc-proto_*.deb \
              $PKGS/make_*.deb $PKGS/build-essential_*.deb \
              $PKGS/perl-base_*.deb \
              $PKGS/fakeroot_*.deb $PKGS/libfakeroot_*.deb \
              $PKGS/kmod_*.deb $PKGS/libkmod2_*.deb \
              $PKGS/patch_*.deb 2>>"$LOG" || { echo "[early] FATAL: build toolchain failed" >> "$LOG"; curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":10,"stage":"prep-toolchain","status":"failed","message":"FATAL: build toolchain install failed"}' > /dev/null 2>&1 || true; exit 1; }

      curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":13,"stage":"prep-dkms","status":"installing","message":"Installing DKMS and Broadcom driver source"}' > /dev/null 2>&1 || true
      echo "[early] Installing DKMS and Broadcom driver source..." >> "$LOG"
      dpkg -i $PKGS/dkms_*.deb $PKGS/broadcom-sta-dkms_*.deb 2>>"$LOG" || { echo "[early] FATAL: dkms/broadcom install failed" >> "$LOG"; curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":13,"stage":"prep-dkms","status":"failed","message":"FATAL: DKMS and Broadcom driver package install failed"}' > /dev/null 2>&1 || true; exit 1; }
      # dkms add is handled by dpkg postinst (creates symlink /var/lib/dkms/.../source -> /usr/src/...)
      # Patches modify /usr/src/... which is visible through the symlink for dkms build
      # Apply DKMS patches for kernel 6.8+ compatibility from ISO
      if [ -d /cdrom/macpro-pkgs/dkms-patches ]; then
        echo "[early] Applying DKMS compatibility patches..." >> "$LOG"
        for patch in $(cat /cdrom/macpro-pkgs/dkms-patches/series); do
          if [ -f "/cdrom/macpro-pkgs/dkms-patches/$patch" ]; then
            echo "[early] Applying $patch..." >> "$LOG"
            if ! patch -p1 -d /usr/src/broadcom-sta-6.30.223.271 < "/cdrom/macpro-pkgs/dkms-patches/$patch" >> "$LOG" 2>&1; then
              echo "[early] FATAL: Patch $patch failed to apply" >> "$LOG"
              curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d "{\"progress\":14,\"stage\":\"prep-patch\",\"status\":\"failed\",\"message\":\"FATAL: DKMS patch $patch failed\"}" > /dev/null 2>&1 || true
              exit 1
            fi
          else
            echo "[early] WARN: Patch file $patch not found, skipping" >> "$LOG"
          fi
        done
      else
        echo "[early] WARN: No DKMS patches directory found" >> "$LOG"
      fi

      curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":15,"stage":"prep-build","status":"building","message":"Compiling wl driver via DKMS"}' > /dev/null 2>&1 || true
      echo "[early] Building wl driver via DKMS..." >> "$LOG"
      if ! dkms build broadcom-sta/6.30.223.271 -k "$KVER" 2>>"$LOG"; then
        echo "[early] WARN: dkms build failed, retrying after clean..." >> "$LOG"
        dkms remove broadcom-sta/6.30.223.271 -k "$KVER" 2>/dev/null || true
        sleep 2
        if ! dkms build broadcom-sta/6.30.223.271 -k "$KVER" 2>>"$LOG"; then
          echo "[early] FATAL: dkms build failed on retry" >> "$LOG"
          curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":15,"stage":"prep-build","status":"failed","message":"FATAL: dkms build failed"}' > /dev/null 2>&1 || true
          exit 1
        fi
      fi
      if ! dkms install broadcom-sta/6.30.223.271 -k "$KVER" 2>>"$LOG"; then
        echo "[early] WARN: dkms install failed, retrying..." >> "$LOG"
        sleep 2
        if ! dkms install broadcom-sta/6.30.223.271 -k "$KVER" 2>>"$LOG"; then
          echo "[early] FATAL: dkms install failed on retry" >> "$LOG"
          curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":15,"stage":"prep-build","status":"failed","message":"FATAL: dkms install failed"}' > /dev/null 2>&1 || true
          exit 1
        fi
      fi

      for drv in b43 ssb bcma brcmsmac; do
          echo "blacklist $drv" >> /etc/modprobe.d/blacklist-bcm.conf
      done
      rmmod b43 ssb bcma brcmsmac 2>/dev/null || true
      echo "[early] Loading wl module..." >> "$LOG"
      modprobe wl 2>>"$LOG" || echo "[early] ERROR: modprobe wl failed" >> "$LOG"
      sleep 5
      if ! lsmod | grep -q wl; then
        echo "[early] WARN: wl not loaded, retrying after forcing conflicting drivers off..." >> "$LOG"
        for drv in b43 ssb bcma brcmsmac wl; do rmmod $drv 2>/dev/null || true; done
        modprobe wl 2>>"$LOG" || echo "[early] ERROR: modprobe wl retry failed" >> "$LOG"
        sleep 5
      fi
      if lsmod | grep -q wl; then
        echo "[early] SUCCESS: wl module loaded" >> "$LOG"
        curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":18,"stage":"prep-wifi","status":"loaded","message":"WiFi driver loaded successfully"}' > /dev/null 2>&1 || true
      else
        echo "[early] FATAL: wl module not in lsmod — cannot continue without WiFi driver" >> "$LOG"
        curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":18,"stage":"prep-wifi","status":"failed","message":"FATAL: WiFi driver failed to load"}' > /dev/null 2>&1 || true
        exit 1
      fi

      curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":20,"stage":"prep-wifi","status":"detecting","message":"Detecting WiFi interface"}' > /dev/null 2>&1 || true
      echo "[early] Detecting WiFi interface..." >> "$LOG"
      WIFI_IFACE=""
      for i in $(seq 1 60); do
        WIFI_IFACE=$(ip link show 2>/dev/null | grep -oE 'wl[pw][^:]+' | head -1)
        [ -n "$WIFI_IFACE" ] && break
        WIFI_IFACE=$(ip link show 2>/dev/null | grep -oE 'wlan[0-9]+' | head -1)
        [ -n "$WIFI_IFACE" ] && break
        WIFI_IFACE=$(ip link show 2>/dev/null | grep -oE 'en[po][0-9]+s[0-9]+' | head -1)
        [ -n "$WIFI_IFACE" ] && break
        sleep 1
      done
      echo "WiFi interface: ${WIFI_IFACE:-not found}" >> "$LOG"
      if [ -z "$WIFI_IFACE" ]; then
        echo "[early] FATAL: No WiFi interface detected after 60s — cannot continue" >> "$LOG"
        curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":20,"stage":"prep-wifi","status":"failed","message":"FATAL: No WiFi interface detected after 60 seconds"}' > /dev/null 2>&1 || true
        exit 1
      fi
      curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d "{\"progress\":22,\"stage\":\"prep-wifi\",\"status\":\"online\",\"message\":\"WiFi interface detected: ${WIFI_IFACE}\"}" > /dev/null 2>&1 || true

      curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":23,"stage":"prep-ssh","status":"starting","message":"Starting SSH server for remote debugging"}' > /dev/null 2>&1 || true
      echo "[early] Starting SSH server for remote debugging..." >> "$LOG"
      apt-get -y install openssh-server 2>>"$LOG" || dpkg --force-depends -i /cdrom/pool/restricted/o/openssh/openssh-server_*.deb /cdrom/pool/restricted/o/openssh/openssh-sftp-server_*.deb 2>>"$LOG" || true
      if [ -f /usr/sbin/sshd ]; then
        mkdir -p /run/sshd
        /usr/sbin/sshd -D -e &
        echo "[early] SSH server started (installer user: ubuntu, pass: ubuntu; target user: teja)" >> "$LOG"
        curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":25,"stage":"prep-ssh","status":"ready","message":"SSH server ready — early-commands complete"}' > /dev/null 2>&1 || true
      else
        echo "[early] WARNING: Could not start SSH server" >> "$LOG"
      fi

      curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":26,"stage":"prep-netcheck","status":"verifying","message":"Verifying WiFi connectivity before storage"}' > /dev/null 2>&1 || true
      echo "[early] Verifying WiFi network connectivity..." >> "$LOG"
      NET_OK=0
      for i in $(seq 1 12); do
        if curl -s -m 5 -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":26,"stage":"prep-netcheck","status":"testing","message":"Network connectivity test"}' > /dev/null 2>&1; then
          NET_OK=1
          break
        fi
        sleep 5
      done
      if [ "$NET_OK" -eq 1 ]; then
        echo "[early] Network connectivity verified" >> "$LOG"
        curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":28,"stage":"prep-netcheck","status":"verified","message":"WiFi connectivity confirmed — safe to proceed with storage"}' > /dev/null 2>&1 || true
      else
        echo "[early] FATAL: WiFi connectivity test failed after 60s — cannot proceed with storage wipe" >> "$LOG"
        curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":26,"stage":"prep-netcheck","status":"failed","message":"FATAL: WiFi not connected — aborting before storage wipe"}' > /dev/null 2>&1 || true
        exit 1
      fi
      set +x

  network:
    version: 2
    renderer: networkd
    wifis:
      wl0:
        match:
          driver: wl
        dhcp4: true
        optional: true
        access-points:
          "ATTj6pXatS":
            password: "j75b39=z?mpg"

  packages:
    - openssh-server
    - wpasupplicant
    - curl
    - wireless-tools
    - avahi-daemon
    - libnss-mdns
    - efibootmgr

  storage:
    config:
      - type: disk
        id: root-disk
        path: /dev/sda
        ptable: gpt
        preserve: true
        wipe: superblock
      - type: partition
        id: efi-partition
        device: root-disk
        size: 512M
        flag: boot
        partition_type: C12A7328-F81F-11D2-BA4B-00A0C93EC93B
        grub_device: true
      - type: format
        id: efi-format
        volume: efi-partition
        fstype: fat32
      - type: mount
        id: efi-mount
        device: efi-format
        path: /boot/efi
      - type: partition
        id: boot-partition
        device: root-disk
        size: 1G
      - type: format
        id: boot-format
        volume: boot-partition
        fstype: ext4
      - type: mount
        id: boot-mount
        device: boot-format
        path: /boot
      - type: partition
        id: root-partition
        device: root-disk
        size: -1
      - type: format
        id: root-format
        volume: root-partition
        fstype: ext4
      - type: mount
        id: root-mount
        device: root-format
        path: /

  late-commands:
    - |
      KVER="$(uname -r)"
      ABI_VER="${KVER%-generic}"
      PKGS="/cdrom/macpro-pkgs"
      LOG="/run/macpro.log"
      WHURL="http://192.168.1.115:8080/webhook"
      echo "[late] Installing WiFi driver into target system..." >> "$LOG"
      curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":30,"stage":"late-init","status":"running","message":"Late commands started — validating kernel headers"}' > /dev/null 2>&1 || true
      # Validate kernel headers exist before attempting install
      if ! ls $PKGS/linux-headers-${ABI_VER}_*.deb 1>/dev/null 2>&1; then
        echo "[late] FATAL: No matching kernel headers for $KVER in $PKGS" >> "$LOG"
        curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":30,"stage":"late-init","status":"failed","message":"FATAL: No kernel headers for running kernel"}' > /dev/null 2>&1 || true
        exit 1
      fi
      # Validate DKMS patches exist — driver WILL NOT compile on kernel 6.8+ without them
      if [ ! -d /cdrom/macpro-pkgs/dkms-patches ] || [ ! -f /cdrom/macpro-pkgs/dkms-patches/series ]; then
        echo "[late] FATAL: DKMS patches missing — broadcom-sta cannot compile on kernel 6.8+" >> "$LOG"
        curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":30,"stage":"late-init","status":"failed","message":"FATAL: DKMS patches missing in late-commands"}' > /dev/null 2>&1 || true
        exit 1
      fi
      # Stage 1: Kernel headers (no deps)
      curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":35,"stage":"late-headers","status":"installing","message":"Stage 1/4: Installing kernel headers into target"}' > /dev/null 2>&1 || true
      dpkg --root /target -i \
        $PKGS/linux-headers-${ABI_VER}_*.deb \
        $PKGS/linux-headers-${KVER}_*.deb \
        $PKGS/linux-libc-dev_*.deb 2>>"$LOG" || { echo "[late] FATAL: Stage 1 (headers) failed — cannot proceed without kernel headers" >> "$LOG"; curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":35,"stage":"late-headers","status":"failed","message":"FATAL: Stage 1 kernel headers install failed"}' > /dev/null 2>&1 || true; exit 1; }
      # Stage 2: Base libraries first, then binaries that depend on them
      curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":45,"stage":"late-libs","status":"installing","message":"Stage 2/4: Installing base libraries into target"}' > /dev/null 2>&1 || true
      dpkg --root /target -i \
        $PKGS/binutils-common_*.deb $PKGS/libbinutils_*.deb \
        $PKGS/libctf-nobfd0_*.deb $PKGS/libctf0_*.deb \
        $PKGS/libsframe1_*.deb $PKGS/libgprofng0_*.deb \
        $PKGS/libgcc-s1_*.deb $PKGS/gcc-13-base_*.deb \
        $PKGS/libisl23_*.deb $PKGS/libmpfr6_*.deb $PKGS/libmpc3_*.deb \
        $PKGS/libstdc++6_*.deb $PKGS/libstdc++-13-dev_*.deb \
        $PKGS/libcrypt-dev_*.deb $PKGS/libc-dev-bin_*.deb \
        $PKGS/libc6-dev_*.deb $PKGS/rpcsvc-proto_*.deb \
        $PKGS/libc-devtools_*.deb \
        $PKGS/binutils_*.deb $PKGS/binutils-x86-64-linux-gnu_*.deb \
        $PKGS/libgcc-13-dev_*.deb $PKGS/cpp-13_*.deb $PKGS/gcc-13_*.deb 2>>"$LOG" || { echo "[late] FATAL: Stage 2 (libs) failed — cannot proceed without base libraries" >> "$LOG"; curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":45,"stage":"late-libs","status":"failed","message":"FATAL: Stage 2 base libraries install failed"}' > /dev/null 2>&1 || true; exit 1; }
      # Stage 3: Build tools (depend on stage 2)
      curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":55,"stage":"late-tools","status":"installing","message":"Stage 3/4: Installing build tools into target"}' > /dev/null 2>&1 || true
      dpkg --root /target -i \
        $PKGS/make_*.deb $PKGS/build-essential_*.deb \
        $PKGS/perl-base_*.deb \
        $PKGS/kmod_*.deb $PKGS/libkmod2_*.deb \
        $PKGS/fakeroot_*.deb $PKGS/libfakeroot_*.deb \
        $PKGS/patch_*.deb 2>>"$LOG" || { echo "[late] FATAL: Stage 3 (tools) failed — cannot proceed without build tools" >> "$LOG"; curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":55,"stage":"late-tools","status":"failed","message":"FATAL: Stage 3 build tools install failed"}' > /dev/null 2>&1 || true; exit 1; }
      # Stage 4: DKMS and driver (depend on stage 3)
      curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":60,"stage":"late-dkms","status":"building","message":"Stage 4/4: Installing DKMS and compiling WiFi driver for target"}' > /dev/null 2>&1 || true
      dpkg --root /target -i $PKGS/dkms_*.deb $PKGS/broadcom-sta-dkms_*.deb 2>>"$LOG" || { echo "[late] FATAL: Stage 4 (dkms/broadcom dpkg) failed" >> "$LOG"; curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":60,"stage":"late-dkms","status":"failed","message":"FATAL: DKMS package install failed"}' > /dev/null 2>&1 || true; exit 1; }
      # dkms add is handled by dpkg postinst (creates symlink in /var/lib/dkms/)
      # Apply DKMS patches for kernel 6.8+ compatibility (before dkms build, after dkms add)
      if [ -d /cdrom/macpro-pkgs/dkms-patches ]; then
        echo "[late] Applying DKMS compatibility patches in target..." >> "$LOG"
        for patch in $(cat /cdrom/macpro-pkgs/dkms-patches/series); do
          if [ -f "/cdrom/macpro-pkgs/dkms-patches/$patch" ]; then
            echo "[late] Applying $patch..." >> "$LOG"
            if ! chroot /target patch -p1 -d /usr/src/broadcom-sta-6.30.223.271 < "/cdrom/macpro-pkgs/dkms-patches/$patch" >> "$LOG" 2>&1; then
              echo "[late] FATAL: Patch $patch failed to apply in target" >> "$LOG"
              curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d "{\"progress\":61,\"stage\":\"late-patch\",\"status\":\"failed\",\"message\":\"FATAL: DKMS patch $patch failed in target\"}" > /dev/null 2>&1 || true
              exit 1
            fi
          else
            echo "[late] WARN: Patch file $patch not found, skipping" >> "$LOG"
          fi
        done
      fi
      # Bind-mount /proc, /sys, /dev for chroot DKMS compilation
      # Set up cleanup trap so mounts are always unmounted, even on failure
      trap 'umount /target/dev /target/sys /target/proc 2>/dev/null || true' EXIT
      mount --bind /proc /target/proc 2>>"$LOG" || { echo "[late] FATAL: mount /proc failed" >> "$LOG"; exit 1; }
      mount --bind /sys /target/sys 2>>"$LOG" || { echo "[late] FATAL: mount /sys failed" >> "$LOG"; umount /target/proc 2>/dev/null || true; exit 1; }
      mount --bind /dev /target/dev 2>>"$LOG" || { echo "[late] FATAL: mount /dev failed" >> "$LOG"; umount /target/sys /target/proc 2>/dev/null || true; exit 1; }
      # dkms add handled by dpkg postinst; patches applied above before bind mounts
      if ! chroot /target dkms build broadcom-sta/6.30.223.271 -k "$KVER" 2>>"$LOG"; then
        echo "[late] WARN: dkms build failed in target, retrying after clean..." >> "$LOG"
        chroot /target dkms remove broadcom-sta/6.30.223.271 -k "$KVER" 2>/dev/null || true
        sleep 2
        if ! chroot /target dkms build broadcom-sta/6.30.223.271 -k "$KVER" 2>>"$LOG"; then
          echo "[late] FATAL: dkms build failed in target on retry" >> "$LOG"
          curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":63,"stage":"late-dkms","status":"failed","message":"FATAL: dkms build failed in target"}' > /dev/null 2>&1 || true
          exit 1
        fi
      fi
      if ! chroot /target dkms install broadcom-sta/6.30.223.271 -k "$KVER" 2>>"$LOG"; then
        echo "[late] WARN: dkms install failed in target, retrying..." >> "$LOG"
        sleep 2
        if ! chroot /target dkms install broadcom-sta/6.30.223.271 -k "$KVER" 2>>"$LOG"; then
          echo "[late] FATAL: dkms install failed in target on retry" >> "$LOG"
          curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":64,"stage":"late-dkms","status":"failed","message":"FATAL: dkms install failed in target"}' > /dev/null 2>&1 || true
          exit 1
        fi
      fi
      umount /target/dev /target/sys /target/proc 2>/dev/null || true
      echo "wl" >> /target/etc/modules
      echo "options wl wl_msglevel=0x1" > /target/etc/modprobe.d/wl.conf
      echo "options cfg80211 ieee80211_regdom=US" > /target/etc/modprobe.d/cfg80211.conf
      echo "[late] WiFi driver installed into target" >> "$LOG"
      curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":65,"stage":"late-dkms","status":"installed","message":"WiFi driver compiled and installed into target"}' > /dev/null 2>&1 || true
    - |
      WHURL="http://192.168.1.115:8080/webhook"
      curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":70,"stage":"late-netplan","status":"configuring","message":"Writing WiFi network configuration"}' > /dev/null 2>&1 || true
      # Remove autoinstall-generated netplan to avoid conflict, write match-based version
      rm -f /target/etc/netplan/50-cloud-init.yaml 2>/dev/null || true
      mkdir -p /target/etc/netplan
      printf 'network:\n  version: 2\n  renderer: networkd\n  wifis:\n    wl0:\n      match:\n        driver: wl\n      dhcp4: true\n      optional: true\n      access-points:\n        "ATTj6pXatS":\n          password: "j75b39=z?mpg"\n' > /target/etc/netplan/01-wifi.yaml
      chmod 600 /target/etc/netplan/01-wifi.yaml
      # Validate netplan config before proceeding
      if command -v netplan 2>/dev/null >/dev/null; then
        netplan generate 2>>/run/macpro.log || echo "[late] WARN: netplan generate failed" >> /run/macpro.log
      fi
      curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":73,"stage":"late-netplan","status":"configured","message":"WiFi netplan config written"}' > /dev/null 2>&1 || true
    - |
      WHURL="http://192.168.1.115:8080/webhook"
      curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":75,"stage":"late-grub","status":"configuring","message":"Configuring GRUB bootloader"}' > /dev/null 2>&1 || true
      echo 'GRUB_CMDLINE_LINUX_DEFAULT="nomodeset amdgpu.si.modeset=0"' >> /target/etc/default/grub.d/macpro.cfg
      sed -i 's/^GRUB_DISABLE_OS_PROBER=.*/GRUB_DISABLE_OS_PROBER=false/' /target/etc/default/grub
      if ! grep -q '^GRUB_DISABLE_OS_PROBER=' /target/etc/default/grub; then
        echo 'GRUB_DISABLE_OS_PROBER=false' >> /target/etc/default/grub
      fi
      printf '#!/bin/sh\nexec tail -n +3 "$0"\nmenuentry "Reboot to Apple Boot Manager" {\n  fwsetup\n}\n' > /target/etc/grub.d/40_macos
      chmod +x /target/etc/grub.d/40_macos
      chroot /target update-grub 2>>/run/macpro.log || echo "[late] WARN: update-grub failed" >> /run/macpro.log
      mkdir -p /target/usr/local/bin
      printf '#!/bin/bash\nset -e\nEFIVARS="/sys/firmware/efi/efivars"\nif [ ! -d "$EFIVARS" ]; then\n  echo "ERROR: EFI variables not available" >&2\n  exit 1\nfi\nMACOS_BOOT=$(efibootmgr | grep -i "macos\\|apple\\|boot0" | head -1 | grep -o "Boot[0-9A-F]\\{4\\}" | sed "s/Boot//" || true)\nif [ -z "$MACOS_BOOT" ]; then\n  echo "WARNING: macOS boot entry not found in EFI variables" >&2\n  echo "Use Apple Boot Manager (hold Option at boot) instead" >&2\n  exit 1\nfi\nefibootmgr --bootnext "$MACOS_BOOT"\necho "macOS set as next boot device. Reboot to start macOS."\n' > /target/usr/local/bin/boot-macos
      chmod +x /target/usr/local/bin/boot-macos
      curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":78,"stage":"late-grub","status":"configured","message":"GRUB bootloader configured with macOS entry"}' > /dev/null 2>&1 || true
    - |
      WHURL="http://192.168.1.115:8080/webhook"
      curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":80,"stage":"late-mdns","status":"configuring","message":"Configuring mDNS hostname resolution"}' > /dev/null 2>&1 || true
      if grep -q '^hosts:' /target/etc/nsswitch.conf; then
        sed -i 's/^hosts:.*/hosts: files mdns_minimal [NOTFOUND=return] dns/' /target/etc/nsswitch.conf
      else
        echo 'hosts: files mdns_minimal [NOTFOUND=return] dns' >> /target/etc/nsswitch.conf
      fi
      curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":83,"stage":"late-mdns","status":"configured","message":"mDNS hostname resolution configured"}' > /dev/null 2>&1 || true
    - |
      WHURL="http://192.168.1.115:8080/webhook"
      KVER="$(uname -r)"
      curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":85,"stage":"late-hold","status":"configuring","message":"Pinning kernel version to prevent upgrades"}' > /dev/null 2>&1 || true
      chroot /target apt-mark hold "linux-image-${KVER}" 2>>/run/macpro.log || echo "[late] WARN: kernel hold failed" >> /run/macpro.log
      chroot /target apt-mark hold "linux-headers-${KVER}" 2>>/run/macpro.log || echo "[late] WARN: headers hold failed" >> /run/macpro.log
      curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":88,"stage":"late-hold","status":"pinned","message":"Kernel version pinned"}' > /dev/null 2>&1 || true
    - |
      WHURL="http://192.168.1.115:8080/webhook"
      curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":88,"stage":"late-firewall","status":"configuring","message":"Configuring firewall"}' > /dev/null 2>&1 || true
      chroot /target apt-get -y install ufw 2>>/run/macpro.log || echo "[late] WARN: ufw install failed" >> /run/macpro.log
      if chroot /target which ufw 2>/dev/null; then
        chroot /target ufw default deny incoming 2>>/run/macpro.log || true
        chroot /target ufw allow ssh 2>>/run/macpro.log || true
        chroot /target ufw --force enable 2>>/run/macpro.log || true
      fi
    - |
      WHURL="http://192.168.1.115:8080/webhook"
      curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":90,"stage":"late-sudo","status":"configuring","message":"Configuring sudo for user teja"}' > /dev/null 2>&1 || true
      echo "teja ALL=(ALL) NOPASSWD:ALL" >> /target/etc/sudoers.d/teja
      chmod 440 /target/etc/sudoers.d/teja
    - |
      WHURL="http://192.168.1.115:8080/webhook"
      LOG="/run/macpro.log"
      curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":95,"stage":"late-logs","status":"saving","message":"Saving installation logs"}' > /dev/null 2>&1 || true
      mkdir -p /target/var/log/macpro-install
      cp /run/macpro.log /target/var/log/macpro-install/early-commands.log || true
      dmesg > /target/var/log/macpro-install/dmesg.log || true
      curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":97,"stage":"late-verify","status":"verifying","message":"Verifying target system before reboot"}' > /dev/null 2>&1 || true
      echo "[late] Verifying target system integrity..." >> "$LOG"
      VERIFY_OK=true
      if [ ! -f /target/vmlinuz ] && [ ! -f /target/boot/vmlinuz-* ]; then
        echo "[late] WARN: No kernel found in /target" >> "$LOG"
        VERIFY_OK=false
      fi
      if [ ! -f /target/etc/netplan/01-wifi.yaml ]; then
        echo "[late] WARN: Netplan WiFi config missing in /target" >> "$LOG"
        VERIFY_OK=false
      fi
      if ! ls /target/lib/modules/*/kernel/net/wireless/ 2>/dev/null | head -1 > /dev/null 2>&1; then
        if [ ! -d /target/lib/modules/"$(uname -r)"/updates/dkms/ ]; then
          echo "[late] WARN: No WiFi driver module in /target kernel modules" >> "$LOG"
        fi
      fi
      if [ -f /target/etc/default/grub.d/macpro.cfg ]; then
        if ! grep -q 'nomodeset' /target/etc/default/grub.d/macpro.cfg; then
          echo "[late] WARN: GRUB nomodeset param missing in target" >> "$LOG"
          VERIFY_OK=false
        fi
      else
        echo "[late] WARN: GRUB macpro.cfg missing in target" >> "$LOG"
        VERIFY_OK=false
      fi
      if [ "$VERIFY_OK" = "false" ]; then
        echo "[late] WARN: Some verification checks failed — installation may not boot correctly" >> "$LOG"
        curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":97,"stage":"late-verify","status":"warning","message":"WARN: Some verification checks failed"}' > /dev/null 2>&1 || true
      else
        echo "[late] All verification checks passed" >> "$LOG"
        curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":98,"stage":"late-verify","status":"verified","message":"Target system verification passed"}' > /dev/null 2>&1 || true
      fi
      curl -s -X POST "$WHURL" -H "Content-Type: application/json" -d '{"progress":100,"stage":"complete","status":"done","message":"Installation complete — rebooting"}' > /dev/null 2>&1 || true

  error-commands:
    - |
      WHURL="http://192.168.1.115:8080/webhook"
      modprobe wl 2>/dev/null || true
      sleep 3
      WIFI_DEV=$(ip link show 2>/dev/null | grep -oE 'wl[pw][^:]+' | head -1)
      if [ -n "$WIFI_DEV" ]; then
        ip link set "$WIFI_DEV" up 2>/dev/null || true
      else
        WIFI_DEV=$(ip link show 2>/dev/null | grep -oE 'wlan[0-9]+' | head -1)
        [ -n "$WIFI_DEV" ] && ip link set "$WIFI_DEV" up 2>/dev/null || true
      fi
    - |
      WHURL="http://192.168.1.115:8080/webhook"
      curl -s -X POST "$WHURL" -H "Content-Type: application/json" \
        -d '{"progress":0,"stage":"error","status":"failed","message":"Installation failed — check logs on target system"}' > /dev/null 2>&1 || true
      ERR_DIR="/var/log/macpro-install"
      mkdir -p "$ERR_DIR" 2>/dev/null || true
      dmesg > "$ERR_DIR/error-dmesg.log" 2>/dev/null || true
      journalctl -b > "$ERR_DIR/error-journalctl.log" 2>/dev/null || true
      cat /run/macpro.log > "$ERR_DIR/error-macpro.log" 2>/dev/null || true
      dkms status > "$ERR_DIR/error-dkms-status.log" 2>/dev/null || true
      lsmod > "$ERR_DIR/error-lsmod.log" 2>/dev/null || true
      lspci -nn > "$ERR_DIR/error-lspci.log" 2>/dev/null || true
      if [ -d /target ]; then
        mkdir -p /target/var/log/macpro-install 2>/dev/null || true
        cp "$ERR_DIR/"* /target/var/log/macpro-install/ 2>/dev/null || true
      fi

  # NOTE: Using reboot (not poweroff) because headless deployment requires
  # remote access after installation completes. The GPU cold-boot quirk
  # (AMD FirePro needs cold boot for init) only affects macOS→Linux transitions,
  # not Linux→Linux reboots. If GPU issues occur on first boot, add
  # nomodeset amdgpu.si.modeset=0 to GRUB (already done in late-commands).
  shutdown: reboot
